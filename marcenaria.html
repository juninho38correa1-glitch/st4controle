<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="refresh" content="300">
<title>TV Tapeçaria — Studyo4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0a;font-family:Arial,sans-serif}
.tv{background:#0a0a0a;padding:14px;display:flex;flex-direction:column;gap:12px;min-height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px}
.logo{font-size:14px;font-weight:700;letter-spacing:3px;color:#fff}
.logo span{color:#FF0066}
.setor-tag{font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 14px;text-transform:uppercase}
.clk{font-size:28px;font-weight:700;color:#fff;letter-spacing:4px;font-variant-numeric:tabular-nums}
.dt{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px;text-align:right}
.mes-tag{font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase}
.score-grid{display:grid;gap:2px}
.score-cell{background:#111;padding:16px 20px;display:flex;flex-direction:column;gap:6px;border-left:4px solid}
.score-label{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase}
.score-val{font-size:52px;font-weight:700;line-height:1;letter-spacing:-2px}
.score-sub{font-size:11px;color:rgba(255,255,255,0.25)}
.score-bar-bg{height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden;margin-top:4px}
.score-bar-f{height:100%;border-radius:2px;transition:width .6s ease}
.main-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:12px;flex:1}
.side-stack{display:flex;flex-direction:column;gap:12px}
.rank-card{background:#111;padding:14px 16px;flex:1}
.rank-title{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:12px;text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid #1a1a1a}
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #141414}
.rank-row:last-child{border:none;padding-top:10px;border-top:1px solid #222;margin-top:4px}
.rpos{font-size:20px;font-weight:700;width:30px;color:rgba(255,255,255,0.15);flex-shrink:0;text-align:center}
.rpos.g{color:#FFD700}.rpos.s{color:#C0C0C0}.rpos.b{color:#CD7F32}
.rname{flex:1;font-size:14px;font-weight:700;color:#fff}
.rname.total{color:rgba(255,255,255,0.4);font-size:12px}
.rbar-wrap{width:100px;flex-shrink:0}
.rbar-bg{height:5px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.rbar-f{height:100%;border-radius:2px;transition:width .6s ease}
.rqty{font-size:16px;font-weight:700;width:44px;text-align:right;flex-shrink:0}
.rqty.total{color:rgba(255,255,255,0.5);font-size:13px}
.rac{font-size:11px;width:54px;text-align:right;color:rgba(255,255,255,0.25);flex-shrink:0}
.mini-card{background:#111;padding:14px 16px}
.mini-title{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:10px;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid #1a1a1a}
.mini-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #111}
.mini-row:last-child{border:none;font-weight:700;color:rgba(255,255,255,0.4);padding-top:8px;border-top:1px solid #1a1a1a;margin-top:2px}
.mini-name{font-size:12px;color:#ccc}
.mini-vals{display:flex;gap:16px}
.mini-v1{font-size:13px;font-weight:700}
.mini-v2{font-size:11px;color:rgba(255,255,255,0.25)}
.status-ok{background:#0a1a0a;border:1px solid #00B050;padding:10px 16px;font-size:11px;color:#00B050;font-weight:700;letter-spacing:1px;text-align:center}
.status-alert{background:#1a0a0a;border:1px solid #FF0000;padding:10px 16px;font-size:11px;color:#FF0000;font-weight:700;letter-spacing:1px;text-align:center;margin-bottom:4px}
.footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #1a1a1a;font-size:11px;color:rgba(255,255,255,0.2);font-weight:700;letter-spacing:.5px}
.footer span{color:rgba(255,255,255,0.5)}
#loading{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.spinner{width:40px;height:40px;border:2px solid #222;border-top-color:#FF0066;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:rgba(255,255,255,0.3);font-size:12px;letter-spacing:2px;text-transform:uppercase}
#erro{display:none;background:#1a0a0a;border:1px solid #FF0000;padding:16px;color:#FF6060;font-size:12px;margin:10px;line-height:1.8}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>Carregando produção...</p></div>
<div id="erro"></div>
<div class="tv" id="app" style="display:none">
  <div class="topbar" style="border-bottom:2px solid #00B050">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="logo">STUDYO<span>4</span></div>
      <div style="width:1px;height:24px;background:#222"></div>
      <div class="setor-tag" style="color:#00B050;background:rgba(0,176,80,0.08);border:1px solid #00B050">TAPEÇARIA</div>
    </div>
    <div style="text-align:right">
      <div class="clk" id="clk">--:--</div>
      <div class="dt" id="dt">--</div>
    </div>
  </div>
  
<div class="score-grid" style="grid-template-columns:repeat(4,1fr)">
  <div class="score-cell" style="border-color:#00B050"><div class="score-label">Tapeçaria — hoje</div><div class="score-val" style="color:#00B050" id="s-tap-dia">—</div><div class="score-sub">peças</div></div>
  <div class="score-cell" style="border-color:#00B050"><div class="score-label">Tapeçaria — mês</div><div class="score-val" style="color:#00B050" id="s-tap-ac">—</div><div class="score-sub" id="mes-atual">acumulado</div></div>
  <div class="score-cell" style="border-color:#0070C0"><div class="score-label">Mont. Final — hoje</div><div class="score-val" style="color:#0070C0" id="s-montfinal">—</div><div class="score-sub">peças</div></div>
  <div class="score-cell" style="border-color:#888"><div class="score-label">Embalagem — hoje</div><div class="score-val" style="color:#aaa" id="s-emb">—</div><div class="score-sub">peças</div></div>
</div>
<div class="main-grid">
  <div class="rank-card">
    <div class="rank-title">// tapeçaria — ranking do dia</div>
    <div id="tb-tap"></div>
  </div>
  <div class="side-stack">
    <div class="rank-card" style="flex:1"><div class="rank-title">// montagem final</div><div id="tb-montfinal"></div></div>
    <div class="mini-card"><div class="mini-title">// embalagem</div><div id="tb-emb"></div></div>
  </div>
</div>

  <div class="footer">
    <div>Atualizado às <span id="upd">--:--:--</span></div>
    <div>Próxima atualização em <span id="ctd" style="color:#00B050">--:--</span></div>
    <div>STUDYO4 — Painel de Produção</div>
  </div>
</div>
<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSu6isVwVIjZKgzu5SvgBip8Xu7kHPelQJqz96JgN9gDXcNIn09xWdhkGeipQ0RwDDDhxZkU2sEP0bp/pub?gid=697175273&single=true&output=csv";
const INTERVALO_MIN = 5;

function pad(n){return String(n).padStart(2,'0');}

function tickClock(){
  const n=new Date();
  document.getElementById('clk').textContent=pad(n.getHours())+':'+pad(n.getMinutes());
  const ds=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const ms=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('dt').textContent=ds[n.getDay()]+', '+n.getDate()+' de '+ms[n.getMonth()]+' de '+n.getFullYear();
  document.getElementById('upd').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  const mesEl=document.getElementById('mes-atual');
  if(mesEl) mesEl.textContent='Acumulado: '+ms[n.getMonth()]+' '+n.getFullYear();
}

let countdown=INTERVALO_MIN*60;
function tickCountdown(){
  countdown--;
  if(countdown<=0){countdown=INTERVALO_MIN*60;carregarDados();}
  document.getElementById('ctd').textContent=pad(Math.floor(countdown/60))+':'+pad(countdown%60);
}
tickClock();setInterval(tickClock,1000);setInterval(tickCountdown,1000);

function set(id,val){const e=document.getElementById(id);if(e)e.textContent=val;}
function setBar(id,val,max){const e=document.getElementById(id);if(e)e.style.width=(max>0?Math.min(100,Math.round(val/max*100)):0)+'%';}

function buildRanking(cid, rows, colorDia, colorAc){
  const el=document.getElementById(cid);if(!el)return;
  const sorted=[...rows].sort((a,b)=>b.dia-a.dia);
  const maxDia=sorted[0]?.dia||1;
  const totalDia=rows.reduce((s,r)=>s+r.dia,0);
  const totalAc=rows.reduce((s,r)=>s+r.ac,0);
  const medals=['g','s','b'];
  let prev=-1,pos=0;
  let html=sorted.map((r,i)=>{
    if(r.dia!==prev){pos=i+1;prev=r.dia;}
    const medal=pos<=3?medals[pos-1]:'';
    const pct=maxDia>0?Math.round(r.dia/maxDia*100):0;
    return `<div class="rank-row">
      <div class="rpos ${medal}">${String(pos).padStart(2,'0')}</div>
      <div class="rname">${r.nome}</div>
      <div class="rbar-wrap"><div class="rbar-bg"><div class="rbar-f" style="width:${pct}%;background:${colorDia}"></div></div></div>
      <span class="rac" title="acumulado mês">${r.ac}</span>
      <div class="rqty" style="color:${colorDia}">${r.dia}</div>
    </div>`;
  }).join('');
  html+=`<div class="rank-row">
    <div class="rpos"></div>
    <div class="rname total">TOTAL</div>
    <div class="rbar-wrap"></div>
    <span class="rac" style="color:${colorAc}">${totalAc}</span>
    <div class="rqty total">${totalDia}</div>
  </div>`;
  el.innerHTML=html;
  return {dia:totalDia,ac:totalAc};
}

function buildMini(cid,rows,color){
  const el=document.getElementById(cid);if(!el)return;
  const total=rows.reduce((s,r)=>s+r.dia,0);
  const totalAc=rows.reduce((s,r)=>s+r.ac,0);
  let html=rows.map(r=>`
    <div class="mini-row">
      <span class="mini-name">${r.nome}</span>
      <div class="mini-vals">
        <span class="mini-v1" style="color:${color}">${r.dia}</span>
        <span class="mini-v2">mês: ${r.ac}</span>
      </div>
    </div>`).join('');
  html+=`<div class="mini-row"><span class="mini-name">TOTAL</span><div class="mini-vals"><span class="mini-v1" style="color:${color}">${total}</span><span class="mini-v2">mês: ${totalAc}</span></div></div>`;
  el.innerHTML=html;
}

function parseCSVLine(line){
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;}
    else if(line[i]===','&&!inQ){r.push(cur.trim().replace(/^"|"$/g,''));cur='';}
    else if(line[i]!=='"'){cur+=line[i];}
  }
  r.push(cur.trim().replace(/^"|"$/g,''));
  return r;
}

function parseDate(str){
  if(!str)return null;
  // aceita DD/MM/YYYY ou YYYY-MM-DD ou MM/DD/YYYY
  str=str.trim();
  let d,m,y;
  if(str.includes('/')){
    const p=str.split('/');
    if(p[2]&&p[2].length===4){d=parseInt(p[0]);m=parseInt(p[1]);y=parseInt(p[2]);}
    else{m=parseInt(p[0]);d=parseInt(p[1]);y=parseInt(p[2]);}
  }else if(str.includes('-')){
    const p=str.split('-');y=parseInt(p[0]);m=parseInt(p[1]);d=parseInt(p[2]);
  }else return null;
  return new Date(y,m-1,d);
}

async function carregarDados(){
  try{
    const resp=await fetch(SHEET_URL);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const txt=await resp.text();
    processar(txt);
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('erro').style.display='none';
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('erro').style.display='block';
    document.getElementById('erro').innerHTML='<strong>⚠ Erro ao carregar dados</strong><br><br>Verifique a conexão e a publicação do Sheets.<br><br><span style="color:#555">'+e.message+'</span>';
  }
}

// agrupa lançamentos por colaborador
// retorna: { nome: { dia: N, ac: N } }
function agrupar(lancamentos, campoDia, campoAc){
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const mesAtual=hoje.getMonth(), anoAtual=hoje.getFullYear();
  const map={};
  lancamentos.forEach(l=>{
    const dt=parseDate(l.data);
    if(!dt)return;
    const noMes=(dt.getMonth()===mesAtual&&dt.getFullYear()===anoAtual);
    const eHoje=(dt.getTime()===hoje.getTime());
    if(!noMes)return;
    if(!map[l.nome])map[l.nome]={dia:0,ac:0};
    map[l.nome].ac+=Number(l[campoAc])||0;
    if(eHoje)map[l.nome].dia+=Number(l[campoDia])||0;
  });
  return map;
}


function processar(csv){
  const linhas=csv.split('
').filter(l=>l.trim());
  const lancamentos=[];
  for(let i=4;i<linhas.length;i++){
    const c=parseCSVLine(linhas[i]);
    if(!c[0]||!c[1])continue;
    lancamentos.push({data:c[0],nome:c[1],setor:c[2],prodCorpo:c[3]});
  }
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const mes=hoje.getMonth(),ano=hoje.getFullYear();
  function agrupar(setorFiltro){
    const map={};
    lancamentos.filter(l=>l.setor===setorFiltro).forEach(l=>{
      const dt=parseDate(l.data);if(!dt)return;
      if(dt.getMonth()!==mes||dt.getFullYear()!==ano)return;
      const eHoje=dt.getTime()===hoje.getTime();
      if(!map[l.nome])map[l.nome]={dia:0,ac:0};
      map[l.nome].ac+=Number(l.prodCorpo)||0;
      if(eHoje)map[l.nome].dia+=Number(l.prodCorpo)||0;
    });
    return Object.entries(map).map(([nome,v])=>({nome,dia:v.dia,ac:v.ac}));
  }
  const tap=agrupar('Tapeçaria');
  const montfin=agrupar('Montagem Final');
  const emb=agrupar('Embalagem');
  set('s-tap-dia',tap.reduce((s,r)=>s+r.dia,0));
  set('s-tap-ac',tap.reduce((s,r)=>s+r.ac,0));
  set('s-montfinal',montfin.reduce((s,r)=>s+r.dia,0));
  set('s-emb',emb.reduce((s,r)=>s+r.dia,0));
  buildRanking('tb-tap',tap,'#00B050','rgba(0,176,80,0.4)');
  buildRanking('tb-montfinal',montfin,'#0070C0','rgba(0,112,192,0.4)');
  buildMini('tb-emb',emb,'#aaa');
}

carregarDados();
</script>
</body>
</html>
