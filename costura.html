<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>TV Costura - Studyo4</title>
<style>*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:#0a0a0a;font-family:Arial,sans-serif}.tv{background:#0a0a0a;padding:14px;display:flex;flex-direction:column;gap:12px;min-height:100vh}.topbar{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px}.logo{font-size:14px;font-weight:700;letter-spacing:3px;color:#fff}.logo span{color:#FF0066}.setor-tag{font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 14px;text-transform:uppercase}.clk{font-size:28px;font-weight:700;color:#fff;letter-spacing:4px}.dt{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px;text-align:right}.score-grid{display:grid;gap:2px}.score-cell{background:#111;padding:14px 18px;display:flex;flex-direction:column;gap:4px;border-left:4px solid}.score-label{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase}.score-val{font-size:44px;font-weight:700;line-height:1;letter-spacing:-2px}.score-sub{font-size:10px;color:rgba(255,255,255,0.25)}.score-bar-bg{height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden;margin-top:4px}.score-bar-f{height:100%;border-radius:2px;transition:width .6s ease}.main-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:12px;flex:1}.grid3col{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;flex:1}.side-stack{display:flex;flex-direction:column;gap:12px}.rank-card{background:#111;padding:14px 16px;flex:1}.col-card{background:#111;padding:14px 16px;display:flex;flex-direction:column;gap:10px}.rank-title{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:10px;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid #1a1a1a}.col-header{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding-bottom:8px;border-bottom:2px solid;margin-bottom:4px}.meta-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #141414}.meta-row:last-child{border:none;padding-top:8px;border-top:1px solid #222;margin-top:4px}.mpos{font-size:18px;font-weight:700;width:28px;color:rgba(255,255,255,0.15);flex-shrink:0;text-align:center}.mpos.g{color:#FFD700}.mpos.s{color:#C0C0C0}.mpos.b{color:#CD7F32}.mname{font-size:13px;font-weight:700;color:#fff;width:110px;flex-shrink:0;line-height:1.3}.mbar-wrap{flex:1;position:relative}.mbar-bg{height:12px;background:#1a1a1a;border-radius:3px;overflow:hidden;position:relative}.mbar-f{height:100%;border-radius:3px;transition:width .8s ease}.mbar-meta{position:absolute;top:0;width:2px;height:100%;background:rgba(255,255,255,0.4)}.mpct{font-size:11px;font-weight:700;width:36px;text-align:right;flex-shrink:0}.mqty{font-size:14px;font-weight:700;width:34px;text-align:right;flex-shrink:0}.meta-badge{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;flex-shrink:0;min-width:46px;text-align:center}.badge-ok{background:rgba(0,176,80,0.2);color:#00B050;border:1px solid rgba(0,176,80,0.3)}.badge-no{background:rgba(255,0,102,0.1);color:rgba(255,0,102,0.5);border:1px solid rgba(255,0,102,0.2)}.chart-wrap{position:relative;width:100%;height:160px}.mini-card{background:#111;padding:12px 16px}.mini-title{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:8px;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid #1a1a1a}.status-ok{background:#0a1a0a;border:1px solid #00B050;padding:8px 14px;font-size:11px;color:#00B050;font-weight:700;letter-spacing:1px;text-align:center}.status-alert{background:#1a0a0a;border:1px solid #FF0000;padding:8px 14px;font-size:11px;color:#FF0000;font-weight:700;letter-spacing:1px;text-align:center;margin-bottom:4px}.meta-row-mini{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #111;font-size:12px;color:#ccc}.meta-row-mini:last-child{border:none}.mtb-label{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:8px}.mtb-wrap{position:relative;height:20px;background:#1a1a1a;border-radius:4px;overflow:hidden}.mtb-fill{height:100%;border-radius:4px;transition:width .8s ease}.mtb-line{position:absolute;top:0;height:100%;width:2px;background:rgba(255,255,255,0.5)}.mtb-pct{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:#fff}.footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #1a1a1a;font-size:11px;color:rgba(255,255,255,0.2);font-weight:700}.footer span{color:rgba(255,255,255,0.5)}#loading{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}.spinner{width:40px;height:40px;border:2px solid #222;border-top-color:#FF0066;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}#loading p{color:rgba(255,255,255,0.3);font-size:12px;letter-spacing:2px;text-transform:uppercase}#erro{display:none;background:#1a0a0a;border:1px solid #FF0000;padding:16px;color:#FF6060;font-size:12px;margin:10px;line-height:1.8}</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>CARREGANDO PRODUCAO...</p></div>
<div id="erro"></div>
<div class="tv" id="app" style="display:none">
  <div class="topbar" style="border-bottom:2px solid #FF0066">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="logo">STUDYO<span>4</span></div>
      <div style="width:1px;height:24px;background:#222"></div>
      <div class="setor-tag" style="color:#FF0066;background:rgba(255,0,102,0.08);border:1px solid #FF0066">COSTURA</div>
    </div>
    <div style="text-align:right">
      <div class="clk" id="clk">--:--</div>
      <div class="dt" id="dt">--</div>
    </div>
  </div>
  <div class="grid3col" style="flex:1">
  <div class="col-card">
    <div class="col-header" style="color:#FF0066;border-color:#FF0066">// Costura Corpo</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="flex:1;background:#0d0d0d;padding:8px;text-align:center">
        <div style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px">Hoje</div>
        <div style="font-size:28px;font-weight:700;color:#FF0066" id="s-corpo-dia">-</div>
      </div>
      <div style="flex:1;background:#0d0d0d;padding:8px;text-align:center">
        <div style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px" id="mes-atual">Mes</div>
        <div style="font-size:28px;font-weight:700;color:#FF0066" id="s-corpo-ac">-</div>
      </div>
    </div>
    <div id="meta-total-corpo" style="margin-bottom:8px"></div>
    <div id="tb-corpo-rank"></div>
    <div style="margin-top:10px"><div class="rank-title">// distribuicao hoje</div><div class="chart-wrap" style="height:220px"><canvas id="chart-corpo"></canvas></div></div>
  </div>
  <div class="col-card">
    <div class="col-header" style="color:#0070C0;border-color:#0070C0">// Costura Almofada</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="flex:1;background:#0d0d0d;padding:8px;text-align:center">
        <div style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px">Hoje</div>
        <div style="font-size:28px;font-weight:700;color:#0070C0" id="s-almof-dia">-</div>
      </div>
      <div style="flex:1;background:#0d0d0d;padding:8px;text-align:center">
        <div style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px">Mes</div>
        <div style="font-size:28px;font-weight:700;color:#0070C0" id="s-almof-ac">-</div>
      </div>
    </div>
    <div id="tb-almof-rank"></div>
    <div style="margin-top:10px"><div class="rank-title">// distribuicao hoje</div><div class="chart-wrap" style="height:220px"><canvas id="chart-almof"></canvas></div></div>
  </div>
  <div class="col-card">
    <div class="col-header" style="color:#00B050;border-color:#00B050">// Corte</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="flex:1;background:#0d0d0d;padding:8px;text-align:center">
        <div style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px">Hoje</div>
        <div style="font-size:28px;font-weight:700;color:#00B050" id="s-corte-dia">-</div>
      </div>
      <div style="flex:1;background:#0d0d0d;padding:8px;text-align:center">
        <div style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px">Mes</div>
        <div style="font-size:28px;font-weight:700;color:#00B050" id="s-corte-ac">-</div>
      </div>
    </div>
    <div id="tb-corte-rank"></div>
    <div style="margin-top:10px"><div class="rank-title">// distribuicao hoje</div><div class="chart-wrap" style="height:180px"><canvas id="chart-corte"></canvas></div></div>
    <div style="margin-top:10px"><div class="mini-title">// retrabalho</div><div id="retrab-status"></div></div>
  </div>
</div>
  <div class="footer">
    <div>Atualizado as <span id="upd">--:--:--</span></div>
    <div>Proxima atualizacao em <span id="ctd" style="color:#FF0066">--:--</span></div>
    <div>STUDYO4 - Painel de Producao</div>
  </div>
</div>
<script>

var LANCAMENTOS_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSu6isVwVIjZKgzu5SvgBip8Xu7kHPelQJqz96JgN9gDXcNIn09xWdhkGeipQ0RwDDDhxZkU2sEP0bp/pub?gid=1405226140&single=true&output=csv';
var CONFIG_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSu6isVwVIjZKgzu5SvgBip8Xu7kHPelQJqz96JgN9gDXcNIn09xWdhkGeipQ0RwDDDhxZkU2sEP0bp/pub?gid=626803240&single=true&output=csv';
var COLAB_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSu6isVwVIjZKgzu5SvgBip8Xu7kHPelQJqz96JgN9gDXcNIn09xWdhkGeipQ0RwDDDhxZkU2sEP0bp/pub?gid=1534833771&single=true&output=csv';
var INTERVALO_MIN=5;
var METAS={};
var COLAB_DATA={};
function pad(n){return String(n).padStart(2,'0');}
function nomeCurto(nome,max){
  max=max||16;if(!nome)return '';
  var p=nome.trim().split(' ');var r=p[0];
  for(var i=1;i<p.length;i++){var t=r+' '+p[i];if(t.length<=max)r=t;else{r=r+'...';break;}}
  return r;
}
function tickClock(){
  var n=new Date();
  document.getElementById('clk').textContent=pad(n.getHours())+':'+pad(n.getMinutes());
  var ds=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
  var ms=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('dt').textContent=ds[n.getDay()]+', '+n.getDate()+' de '+ms[n.getMonth()]+' de '+n.getFullYear();
  document.getElementById('upd').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  var mel=document.getElementById('mes-atual');if(mel)mel.textContent='Acumulado: '+ms[n.getMonth()]+' '+n.getFullYear();
}
var countdown=INTERVALO_MIN*60;
function tickCountdown(){
  countdown--;
  if(countdown<=0){countdown=INTERVALO_MIN*60;carregarDados();}
  document.getElementById('ctd').textContent=pad(Math.floor(countdown/60))+':'+pad(countdown%60);
}
tickClock();setInterval(tickClock,1000);setInterval(tickCountdown,1000);
function set(id,val){var e=document.getElementById(id);if(e)e.textContent=val;}
function setBar(id,val,max){var e=document.getElementById(id);if(e)e.style.width=(max>0?Math.min(100,Math.round(val/max*100)):0)+'%';}
function parseCSVLine(line){
  var r=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;}
    else if(line[i]===','&&!inQ){r.push(cur.trim().replace(/^"|"$/g,''));cur='';}
    else if(line[i]!=='"'){cur+=line[i];}
  }
  r.push(cur.trim().replace(/^"|"$/g,''));return r;
}
function parseDate(str){
  if(!str)return null;str=str.trim();
  var parts,d,m,y,sl=str.indexOf('/'),da=str.indexOf('-');
  if(sl!==-1){parts=str.split('/');if(parts[2]&&parts[2].length===4){d=+parts[0];m=+parts[1];y=+parts[2];}else{m=+parts[0];d=+parts[1];y=+parts[2];}}
  else if(da!==-1){parts=str.split('-');y=+parts[0];m=+parts[1];d=+parts[2];}
  else return null;
  if(!y||!m||!d)return null;return new Date(y,m-1,d);
}
function parseColab(csv){
  var linhas=csv.split('\n').filter(function(l){return l.trim();});
  var map={};
  for(var i=2;i<linhas.length;i++){
    var c=parseCSVLine(linhas[i]);
    if(!c[0])continue;
    map[c[0].trim()]={setor:c[1]?c[1].trim():'',sub:c[2]?c[2].trim():'',meta:Number(c[3])||0};
  }
  return map;
}
function parseConfig(csv){
  var linhas=csv.split('\n').filter(function(l){return l.trim();});
  var map={};
  for(var i=2;i<linhas.length;i++){
    var c=parseCSVLine(linhas[i]);
    if(c[0]&&c[1])map[c[0].trim()]=Number(c[1])||0;
  }
  return map;
}
function getMetaPessoa(nome){
  var d=COLAB_DATA[nome];
  return d?d.meta:0;
}
function buildMetaRanking(cid,rows,color){
  var el=document.getElementById(cid);if(!el)return;
  var sorted=rows.slice().sort(function(a,b){return b.dia-a.dia;});
  var medals=['g','s','b'];var prev=-1,pos=0;
  var html=sorted.map(function(r,i){
    if(r.dia!==prev){pos=i+1;prev=r.dia;}
    var medal=pos<=3?medals[pos-1]:'';
    var meta=getMetaPessoa(r.nome);
    var pct=meta>0?Math.round(r.dia/meta*100):0;
    var pctCap=Math.min(pct,100);
    var metaPosX=meta>0?Math.min(100,Math.round(meta/Math.max(meta,r.dia)*100)):100;
    var barColor=meta>0?(pct>=100?'#00B050':pct>=70?'#EF9F27':'#FF0066'):color;
    var badgeHtml=meta>0?('<div class="meta-badge '+(pct>=100?'badge-ok':'badge-no')+'">'+(pct>=100?'META ⭐':pct+'%')+'</div>'):'';
    var nomeExib=nomeCurto(r.nome,16);
    return '<div class="meta-row"><div class="mpos '+medal+'">'+String(pos).padStart(2,'0')+'</div><div class="mname"><div>'+nomeExib+'</div><div style="font-size:10px;font-weight:400;color:rgba(255,255,255,0.3);margin-top:1px">ac: '+r.ac+(meta>0?' · meta:'+meta:'')+'</div></div><div class="mbar-wrap"><div class="mbar-bg"><div class="mbar-f" style="width:'+pctCap+'%;background:'+barColor+'"></div>'+(meta>0?'<div class="mbar-meta" style="left:'+metaPosX+'%"></div>':'')+'</div></div><div class="mpct" style="color:'+barColor+'">'+(meta>0?pct+'%':'')+'</div><div class="mqty" style="color:'+color+'">'+r.dia+'</div>'+badgeHtml+'</div>';
  }).join('');
  var total=rows.reduce(function(s,r){return s+r.dia;},0);
  var totalAc=rows.reduce(function(s,r){return s+r.ac;},0);
  html+='<div class="meta-row"><div class="mpos"></div><div class="mname" style="color:rgba(255,255,255,0.4);font-size:11px">TOTAL</div><div class="mbar-wrap"></div><div class="mpct"></div><div class="mqty" style="color:rgba(255,255,255,0.4);font-size:12px">'+total+'</div><div class="meta-badge" style="font-size:9px;color:rgba(255,255,255,0.3)">ac:'+totalAc+'</div></div>';
  el.innerHTML=html;
}
function buildPizza(canvasId,rows,color){
  var canvas=document.getElementById(canvasId);if(!canvas||!rows.length)return;
  var ctx=canvas.getContext('2d');
  var W=canvas.offsetWidth||300;var H=canvas.offsetHeight||160;
  canvas.width=W;canvas.height=H;ctx.clearRect(0,0,W,H);
  var total=rows.reduce(function(s,r){return s+r.dia;},0);
  if(total===0)return;
  var colors=['#FF0066','#0070C0','#00B050','#EF9F27','#7030A0','#FF6B35','#00B4D8','#F72585'];
  if(color==='#0070C0')colors=['#0070C0','#378ADD','#85B7EB','#00B050','#EF9F27','#FF0066','#7030A0','#B5D4F4'];
  if(color==='#00B050')colors=['#00B050','#1D9E75','#5DCAA5','#0070C0','#EF9F27','#FF0066','#7030A0','#9FE1CB'];
  if(color==='#EF9F27')colors=['#EF9F27','#BA7517','#FAC775','#FF0066','#0070C0','#00B050','#7030A0','#F72585'];
  var sorted=rows.slice().sort(function(a,b){return b.dia-a.dia;});
  var legendH=sorted.length*18+8;
  var r=Math.min(W/2,(H-legendH-16)/2)*0.85;
  var cx=W/2,cy=r+8;
  var angle=-Math.PI/2;
  sorted.forEach(function(row,i){
    var slice=2*Math.PI*(row.dia/total);
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+slice);
    ctx.closePath();
    ctx.fillStyle=colors[i%colors.length];ctx.fill();
    ctx.strokeStyle='#0a0a0a';ctx.lineWidth=2;ctx.stroke();
    if(slice>0.18){
      ctx.fillStyle='#fff';ctx.font='bold 11px Arial';ctx.textAlign='center';
      var tx=cx+Math.cos(angle+slice/2)*r*0.65;
      var ty=cy+Math.sin(angle+slice/2)*r*0.65;
      ctx.fillText(row.dia,tx,ty);
    }
    angle+=slice;
  });
  var legY=cy+r+14;
  sorted.forEach(function(row,i){
    var lx=W/2-60;
    ctx.fillStyle=colors[i%colors.length];
    ctx.fillRect(lx,legY,10,10);
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='9px Arial';ctx.textAlign='left';
    ctx.fillText(nomeCurto(row.nome,12)+' ('+row.dia+')',lx+13,legY+9);
    legY+=18;
  });
}
function buildMetaTotal(cid,totalDia,meta,color){
  var el=document.getElementById(cid);if(!el)return;
  var pct=meta>0?Math.min(Math.round(totalDia/meta*100),150):0;
  var barColor=pct>=100?'#00B050':pct>=70?'#EF9F27':'#FF0066';
  var metaPos=meta>0?Math.min(100,Math.round(meta/Math.max(meta,totalDia)*100)):100;
  el.innerHTML='<div class="mtb-label">PROGRESSO GERAL — '+totalDia+' / '+meta+' pecas ('+pct+'%)</div><div class="mtb-wrap"><div class="mtb-fill" style="width:'+Math.min(pct,100)+'%;background:'+barColor+'"></div><div class="mtb-line" style="left:'+metaPos+'%"></div><div class="mtb-pct">'+pct+'%</div></div>';
}
async function carregarDados(){
  try{
    var r0=await fetch(COLAB_URL);
    if(r0.ok){var csv0=await r0.text();COLAB_DATA=parseColab(csv0);}
    var r1=await fetch(CONFIG_URL);
    if(r1.ok){var csv1=await r1.text();METAS=parseConfig(csv1);}
    var r2=await fetch(LANCAMENTOS_URL);
    if(!r2.ok)throw new Error('HTTP '+r2.status);
    var txt=await r2.text();
    processar(txt);
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('erro').style.display='none';
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('erro').style.display='block';
    document.getElementById('erro').innerHTML='<strong>Erro ao carregar</strong><br>'+e.message;
  }
}

function processar(csv){
  var linhas=csv.split('\n').filter(function(l){return l.trim();});
  var lancamentos=[];
  for(var i=3;i<linhas.length;i++){
    var c=parseCSVLine(linhas[i]);
    if(!c[0]||!c[1])continue;
    lancamentos.push({data:c[0],nome:c[1],setor:c[2],prodCorpo:c[3],prodAlmof:c[4],retrabalho:c[5]});
  }
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var mes=hoje.getMonth(),ano=hoje.getFullYear();
  var mapC={},mapA={},mapR={},mapCt={};
  lancamentos.forEach(function(l){
    var dt=parseDate(l.data);if(!dt)return;
    if(dt.getMonth()!==mes||dt.getFullYear()!==ano)return;
    var eHoje=dt.getTime()===hoje.getTime();
    if(l.setor==='Costura'){
      if(!mapC[l.nome])mapC[l.nome]={dia:0,ac:0};
      if(!mapA[l.nome])mapA[l.nome]={dia:0,ac:0};
      if(!mapR[l.nome])mapR[l.nome]={dia:0,ac:0};
      mapC[l.nome].ac+=Number(l.prodCorpo)||0;
      mapA[l.nome].ac+=Number(l.prodAlmof)||0;
      mapR[l.nome].ac+=Number(l.retrabalho)||0;
      if(eHoje){mapC[l.nome].dia+=Number(l.prodCorpo)||0;mapA[l.nome].dia+=Number(l.prodAlmof)||0;mapR[l.nome].dia+=Number(l.retrabalho)||0;}
    }
    if(l.setor==='Corte'){
      if(!mapCt[l.nome])mapCt[l.nome]={dia:0,ac:0};
      mapCt[l.nome].ac+=Number(l.prodCorpo)||0;
      if(eHoje)mapCt[l.nome].dia+=Number(l.prodCorpo)||0;
    }
  });
  var rowsC=Object.keys(mapC).map(function(n){return{nome:n,dia:mapC[n].dia,ac:mapC[n].ac};});
  var rowsA=Object.keys(mapA).map(function(n){return{nome:n,dia:mapA[n].dia,ac:mapA[n].ac};});
  var rowsR=Object.keys(mapR).map(function(n){return{nome:n,dia:mapR[n].dia,ac:mapR[n].ac};});
  var rowsCt=Object.keys(mapCt).map(function(n){return{nome:n,dia:mapCt[n].dia,ac:mapCt[n].ac};});
  var tCD=rowsC.reduce(function(s,r){return s+r.dia;},0);
  var tCA=rowsC.reduce(function(s,r){return s+r.ac;},0);
  var tAD=rowsA.reduce(function(s,r){return s+r.dia;},0);
  var tAA=rowsA.reduce(function(s,r){return s+r.ac;},0);
  var tCtD=rowsCt.reduce(function(s,r){return s+r.dia;},0);
  var tCtA=rowsCt.reduce(function(s,r){return s+r.ac;},0);
  var tRD=rowsR.reduce(function(s,r){return s+r.dia;},0);
  var metaTotal=rowsC.reduce(function(s,r){return s+(getMetaPessoa(r.nome)||12);},0);
  set('s-corpo-dia',tCD);set('s-corpo-ac',tCA);
  set('s-almof-dia',tAD);set('s-almof-ac',tAA);
  set('s-corte-dia',tCtD);set('s-corte-ac',tCtA);
  buildMetaTotal('meta-total-corpo',tCD,metaTotal,'#FF0066');
  buildMetaRanking('tb-corpo-rank',rowsC,'#FF0066');
  buildMetaRanking('tb-almof-rank',rowsA,'#0070C0');
  buildMetaRanking('tb-corte-rank',rowsCt,'#00B050');
  setTimeout(function(){
    buildPizza('chart-corpo',rowsC,'#FF0066');
    buildPizza('chart-almof',rowsA,'#0070C0');
    buildPizza('chart-corte',rowsCt,'#00B050');
  },100);
  var el=document.getElementById('retrab-status');
  if(el){
    var comR=rowsR.filter(function(r){return r.dia>0;});
    if(tRD===0){el.innerHTML='<div class="status-ok">NENHUM RETRABALHO HOJE</div>';}
    else{el.innerHTML='<div class="status-alert">'+tRD+' PECA(S) EM RETRABALHO</div>'+comR.map(function(r){return '<div class="meta-row-mini"><span>'+nomeCurto(r.nome,16)+'</span><span style="color:#FF0000;font-weight:700">'+r.dia+'</span></div>';}).join('');}
  }
}
carregarDados();
</script>
