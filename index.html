<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Controle de Producao — Studyo4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Georgia',serif}
.page{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
.left{background:#DCCCBE;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:60px 64px;position:relative}
.logo-area{display:flex;align-items:center;gap:16px;margin-bottom:48px;padding-bottom:32px;border-bottom:1px solid rgba(44,37,32,0.2)}
.logo-box{width:52px;height:52px;border:1.5px solid #2C2520;display:flex;align-items:center;justify-content:center}
.logo-name{font-family:'Arial',sans-serif;font-size:13px;font-weight:700;letter-spacing:4px;color:#2C2520}
.title-sub{font-family:'Arial',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;color:#8a7060;text-transform:uppercase;margin-bottom:12px}
.title-main{font-size:52px;font-weight:700;line-height:1.1;color:#2C2520;letter-spacing:-1px}
.title-main span{display:block}
.nav-buttons{display:flex;flex-direction:column;gap:12px;margin-top:52px;width:100%;max-width:340px}
.btn{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border:1px solid #2C2520;background:transparent;color:#2C2520;font-family:'Arial',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s}
.btn:hover{background:#2C2520;color:#DCCCBE}
.btn-arrow{font-size:16px;transition:transform .2s}
.btn:hover .btn-arrow{transform:translateX(4px)}
.footer-left{position:absolute;bottom:32px;left:64px;font-family:'Arial',sans-serif;font-size:10px;color:#8a7060;letter-spacing:1px}
.right{background:#2C2520;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.ring-inner{position:absolute;width:180px;height:180px;border-radius:50%;border:1px solid rgba(220,204,190,0.15);display:flex;align-items:center;justify-content:center}
.ring-center{text-align:center}
.ring-year{font-family:'Arial',sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;color:rgba(220,204,190,0.4);text-transform:uppercase;display:block;margin-bottom:8px}
.ring-logo{font-family:'Arial',sans-serif;font-size:15px;font-weight:700;letter-spacing:6px;color:#DCCCBE}

.clock-area{position:absolute;bottom:48px;right:48px;text-align:right}
.clock-time{font-family:'Arial',sans-serif;font-size:32px;font-weight:700;letter-spacing:4px;color:#DCCCBE}
.clock-date{font-family:'Arial',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(220,204,190,0.4);margin-top:4px;text-transform:uppercase}
.dot-grid{position:absolute;top:32px;left:32px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px;opacity:.15}
.dot{width:3px;height:3px;border-radius:50%;background:#DCCCBE}
</style>
</head>
<body>
<div class="page">
  <div class="left">
    <div class="logo-area">
      <div style="font-family:Arial,sans-serif;line-height:1.3"><div style="font-size:13px;font-weight:700;letter-spacing:4px;color:#2C2520">STUDYO4</div><div style="font-size:9px;letter-spacing:3px;color:#6B5A4E">ESTOFADOS</div></div>
    </div>
    <div>
      <div class="title-sub">Painel de Produção</div>
      <div class="title-main">
        <span>CONTROLE</span>
        <span>DE</span>
        <span>PRODUÇÃO</span>
      </div>
    </div>
    <div class="nav-buttons">
      <a href="costura.html" class="btn"><span>Costura/ Corte TV 1</span><span class="btn-arrow">&#x2192;</span></a>
      <a href="tapecaria.html" class="btn"><span>Tapeçaria/ Montagem TV 2</span><span class="btn-arrow">&#x2192;</span></a>
      <a href="marcenaria.html" class="btn"><span>Marcenaria/ Espumação TV 3</span><span class="btn-arrow">&#x2192;</span></a>
    </div>
    </div>
      <a href="dashboard-nc.html" class="btn"><span>DashBoard Nc's/span><span class="btn-arrow">&#x2192;</span></a>
    </div>
    </div>
    </div>
    </div>
    <a href="relatorio.html" class="btn" style="margin-top:8px;border-color:#1a6b3a;color:#1a6b3a"><span>Relatório de Produção</span><span class="btn-arrow">&#x2192;</span></a>
    </div>
    <div class="footer-left">&#169; Junior Corr&#234;a &middot; Todos os direitos reservados</div>
  </div>

  <div class="right">
    <div class="dot-grid" id="dots"></div>
    <canvas id="ringCanvas" width="340" height="340" style="position:absolute;inset:calc(50% - 170px) auto auto calc(50% - 170px)"></canvas>
    <div class="ring-inner">
      <div class="ring-center">
        <span class="ring-year" id="ring-year">2026</span>
        <div class="ring-logo">STUDYO4</div>
      </div>
    </div>
    <div class="clock-area">
      <div class="clock-time" id="clk">--:--</div>
      <div class="clock-date" id="dt">--</div>
    </div>
  </div>
</div>
<script>
var dg=document.getElementById('dots');
for(var i=0;i<36;i++){var d=document.createElement('div');d.className='dot';dg.appendChild(d);}
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  var n=new Date();
  document.getElementById('clk').textContent=pad(n.getHours())+':'+pad(n.getMinutes());
  var ms=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var ds=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
  document.getElementById('dt').textContent=ds[n.getDay()]+' '+n.getDate()+' '+ms[n.getMonth()]+' '+n.getFullYear();
  document.getElementById('ring-year').textContent=n.getFullYear();
}
tick();setInterval(tick,1000);
var canvas=document.getElementById('ringCanvas');
var ctx=canvas.getContext('2d');
var angle=0;
var txt='STUDYO4  \u00B7  2026  \u00B7  ';
txt=txt+txt+txt;
function drawRing(){
  ctx.clearRect(0,0,340,340);
  var cx=170,cy=170,r=155;
  ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);
  ctx.strokeStyle='rgba(220,204,190,0.12)';ctx.lineWidth=1;
  ctx.setLineDash([4,8]);ctx.stroke();ctx.setLineDash([]);
  ctx.save();
  ctx.font='bold 9px Arial';
  ctx.fillStyle='rgba(220,204,190,0.35)';
  var chars=txt.split('');
  var total=chars.length;
  var angStep=2*Math.PI/total;
  chars.forEach(function(ch,i){
    var a=angle+i*angStep;
    ctx.save();
    ctx.translate(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.rotate(a+Math.PI/2);
    ctx.fillText(ch,0,0);
    ctx.restore();
  });
  [0,Math.PI/2,Math.PI,3*Math.PI/2].forEach(function(a){
    ctx.beginPath();
    ctx.arc(cx+(r+12)*Math.cos(a),cy+(r+12)*Math.sin(a),2.5,0,2*Math.PI);
    ctx.fillStyle='rgba(220,204,190,0.5)';ctx.fill();
  });
  ctx.restore();
  angle+=0.003;
  requestAnimationFrame(drawRing);
}
drawRing();
</script>
</body>
</html>
