<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Relatorio de Producao — Studyo4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:Arial,sans-serif;background:#F5F0EA;color:#2C2520}
.page{max-width:1100px;margin:0 auto;padding:20px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:2px solid #2C2520;margin-bottom:20px}
.logo{font-size:14px;font-weight:700;letter-spacing:3px;color:#2C2520}
.logo span{font-weight:400;letter-spacing:2px;color:#6B5A4E}
.back-btn{font-size:11px;font-weight:700;letter-spacing:2px;padding:6px 16px;border:1px solid rgba(44,37,32,0.3);background:transparent;color:#2C2520;cursor:pointer;text-decoration:none;text-transform:uppercase}
.back-btn:hover{background:#2C2520;color:#DCCCBE}
.report-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.report-title{font-size:22px;font-weight:700;letter-spacing:1px;color:#2C2520}
.report-sub{font-size:12px;color:#6B5A4E;margin-top:4px;letter-spacing:1px}
.period-btns{display:flex;gap:8px}
.pbtn{font-size:11px;font-weight:700;letter-spacing:1px;padding:8px 20px;border:1px solid rgba(44,37,32,0.3);background:transparent;color:#2C2520;cursor:pointer;text-transform:uppercase;transition:all .2s}
.pbtn.active{background:#2C2520;color:#DCCCBE;border-color:#2C2520}
.pbtn:hover{background:#2C2520;color:#DCCCBE}

.sum-label{font-size:9px;font-weight:700;letter-spacing:2px;color:#6B5A4E;text-transform:uppercase;margin-bottom:4px}
.sum-val{font-size:28px;font-weight:700;line-height:1}
.sum-sub{font-size:10px;color:#6B5A4E;margin-top:3px}
.setor-block{margin-bottom:28px}
.setor-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:8px 14px;margin-bottom:1px}
.table{width:100%;border-collapse:collapse}
.table th{background:#2C2520;color:#DCCCBE;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 12px;text-align:left}
.table td{padding:9px 12px;font-size:12px;border-bottom:1px solid rgba(44,37,32,0.08);background:#E8E0D5}
.table tr:nth-child(even) td{background:#DCCCBE}
.table tr:hover td{background:#d4c4b0}
.bar-wrap{width:100%;height:8px;background:rgba(44,37,32,0.1);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap}
.badge-ok{background:rgba(26,107,58,0.15);color:#1a6b3a;border:1px solid rgba(26,107,58,0.3)}
.badge-no{background:rgba(139,58,15,0.1);color:#8B3A0F;border:1px solid rgba(139,58,15,0.2)}
.badge-zer{background:rgba(44,37,32,0.08);color:#8a7060;border:1px solid rgba(44,37,32,0.15)}
.loading-msg{text-align:center;padding:60px;font-size:13px;letter-spacing:2px;color:#6B5A4E;text-transform:uppercase}
.spinner{width:36px;height:36px;border:2px solid rgba(44,37,32,0.15);border-top-color:#8B3A0F;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.print-btn{font-size:11px;font-weight:700;letter-spacing:2px;padding:8px 20px;border:1px solid #1a6b3a;background:transparent;color:#1a6b3a;cursor:pointer;text-transform:uppercase;transition:all .2s}
.print-btn:hover{background:#1a6b3a;color:#fff}
.footer{text-align:center;padding:20px 0;font-size:10px;color:#8a7060;border-top:1px solid rgba(44,37,32,0.15);margin-top:24px}
@media print{
  .no-print{display:none!important}
  body{background:#fff}
  .page{padding:10px}
  .sum-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .table th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .setor-title{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>

<script>


var LANCAMENTOS_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSu6isVwVIjZKgzu5SvgBip8Xu7kHPelQJqz96JgN9gDXcNIn09xWdhkGeipQ0RwDDDhxZkU2sEP0bp/pub?gid=1405226140&single=true&output=csv';
var CONFIG_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSu6isVwVIjZKgzu5SvgBip8Xu7kHPelQJqz96JgN9gDXcNIn09xWdhkGeipQ0RwDDDhxZkU2sEP0bp/pub?gid=626803240&single=true&output=csv';
var COLAB_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSu6isVwVIjZKgzu5SvgBip8Xu7kHPelQJqz96JgN9gDXcNIn09xWdhkGeipQ0RwDDDhxZkU2sEP0bp/pub?gid=1534833771&single=true&output=csv';
var INTERVALO_MIN=5;
var METAS={};
var COLAB_DATA={};
function pad(n){return String(n).padStart(2,'0');}
function nomeCurto(nome,max){
  max=max||16;if(!nome)return '';
  var p=nome.trim().split(' ');var r=p[0];
  for(var i=1;i<p.length;i++){var t=r+' '+p[i];if(t.length<=max)r=t;else{r=r+'...';break;}}
  return r;
}
function tickClock(){
  var n=new Date();
  document.getElementById('clk').textContent=pad(n.getHours())+':'+pad(n.getMinutes());
  var ds=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
  var ms=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('dt').textContent=ds[n.getDay()]+', '+n.getDate()+' de '+ms[n.getMonth()]+' de '+n.getFullYear();
  document.getElementById('upd').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  var mel=document.getElementById('mes-atual');if(mel)mel.textContent='Acumulado: '+ms[n.getMonth()]+' '+n.getFullYear();
}
var countdown=INTERVALO_MIN*60;
function tickCountdown(){
  countdown--;
  if(countdown<=0){countdown=INTERVALO_MIN*60;carregarDados();}
  document.getElementById('ctd').textContent=pad(Math.floor(countdown/60))+':'+pad(countdown%60);
}
tickClock();setInterval(tickClock,1000);setInterval(tickCountdown,1000);
function set(id,val){var e=document.getElementById(id);if(e)e.textContent=val;}
function setBar(id,val,max){var e=document.getElementById(id);if(e)e.style.width=(max>0?Math.min(100,Math.round(val/max*100)):0)+'%';}
function parseCSVLine(line){
  var r=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;}
    else if(line[i]===','&&!inQ){r.push(cur.trim().replace(/^"|"$/g,''));cur='';}
    else if(line[i]!=='"'){cur+=line[i];}
  }
  r.push(cur.trim().replace(/^"|"$/g,''));return r;
}
function parseDate(str){
  if(!str)return null;str=str.trim();
  var parts,d,m,y,sl=str.indexOf('/'),da=str.indexOf('-');
  if(sl!==-1){parts=str.split('/');if(parts[2]&&parts[2].length===4){d=+parts[0];m=+parts[1];y=+parts[2];}else{m=+parts[0];d=+parts[1];y=+parts[2];}}
  else if(da!==-1){parts=str.split('-');y=+parts[0];m=+parts[1];d=+parts[2];}
  else return null;
  if(!y||!m||!d)return null;return new Date(y,m-1,d);
}
function parseColab(csv){
  var linhas=csv.split('\n').filter(function(l){return l.trim();});
  var map={};
  for(var i=2;i<linhas.length;i++){
    var c=parseCSVLine(linhas[i]);
    if(!c[0])continue;
    map[c[0].trim()]={setor:c[1]?c[1].trim():'',sub:c[2]?c[2].trim():'',meta:Number(c[3])||0};
  }
  return map;
}
function parseConfig(csv){
  var linhas=csv.split('\n').filter(function(l){return l.trim();});
  var map={};
  for(var i=2;i<linhas.length;i++){
    var c=parseCSVLine(linhas[i]);
    if(c[0]&&c[1])map[c[0].trim()]=Number(c[1])||0;
  }
  return map;
}
function getMetaPessoa(nome){
  var d=COLAB_DATA[nome];
  return d?d.meta:0;
}
function buildMetaRanking(cid,rows,color){
  var el=document.getElementById(cid);if(!el)return;
  var sorted=rows.slice().sort(function(a,b){return b.dia-a.dia;});
  var medals=['g','s','b'];var prev=-1,pos=0;
  var html=sorted.map(function(r,i){
    if(r.dia!==prev){pos=i+1;prev=r.dia;}
    var medal=pos<=3?medals[pos-1]:'';
    var meta=getMetaPessoa(r.nome);
    var pct=meta>0?Math.round(r.dia/meta*100):0;
    var pctCap=Math.min(pct,100);
    var metaPosX=meta>0?Math.min(100,Math.round(meta/Math.max(meta,r.dia)*100)):100;
    var barColor=meta>0?(pct>=100?'#00B050':pct>=70?'#EF9F27':'#FF0066'):color;
    var badgeHtml=meta>0?('<div class="meta-badge '+(pct>=100?'badge-ok':'badge-no')+'">'+(pct>=100?'META ⭐':pct+'%')+'</div>'):'';
    var nomeExib=nomeCurto(r.nome,16);
    return '<div class="meta-row"><div class="mpos '+medal+'">'+String(pos).padStart(2,'0')+'</div><div class="mname"><div>'+nomeExib+'</div><div style="font-size:10px;font-weight:400;color:#6B5A4E;margin-top:1px">ac: '+r.ac+(meta>0?' · meta:'+meta:'')+'</div></div><div class="mbar-wrap"><div class="mbar-bg"><div class="mbar-f" style="width:'+pctCap+'%;background:'+barColor+'"></div>'+(meta>0?'<div class="mbar-meta" style="left:'+metaPosX+'%"></div>':'')+'</div></div><div class="mpct" style="color:'+barColor+'">'+(meta>0?pct+'%':'')+'</div><div class="mqty" style="color:'+color+'">'+r.dia+'</div>'+badgeHtml+'</div>';
  }).join('');
  var total=rows.reduce(function(s,r){return s+r.dia;},0);
  var totalAc=rows.reduce(function(s,r){return s+r.ac;},0);
  html+='<div class="meta-row"><div class="mpos"></div><div class="mname" style="color:#6B5A4E;font-size:11px">TOTAL</div><div class="mbar-wrap"></div><div class="mpct"></div><div class="mqty" style="color:#6B5A4E;font-size:12px">'+total+'</div><div class="meta-badge" style="font-size:9px;color:#6B5A4E">ac:'+totalAc+'</div></div>';
  el.innerHTML=html;
}
function buildPizza(canvasId,rows,color){
  var canvas=document.getElementById(canvasId);if(!canvas||!rows.length)return;
  var ctx=canvas.getContext('2d');
  var W=canvas.offsetWidth||300;var H=canvas.offsetHeight||220;
  canvas.width=W;canvas.height=H;ctx.clearRect(0,0,W,H);
  var sorted=rows.slice().sort(function(a,b){return b.dia-a.dia;});
  var hasData=sorted.some(function(r){return r.dia>0;});
  var total=sorted.reduce(function(s,r){return s+r.dia;},0);
  var palette=['#8B3A0F','#1a5f8a','#1a6b3a','#8a6010','#7030A0','#5B3A8B','#1a7a6a','#8B5A2B'];
  var legW=115;
  var pieAreaW=W-legW-8;
  var pieR=Math.min(pieAreaW/2,H/2)-8;
  var cx=legW+8+pieAreaW/2;
  var cy=H/2;
  if(hasData){
    var angle=-Math.PI/2;
    sorted.forEach(function(row,i){
      if(row.dia===0)return;
      var slice=2*Math.PI*(row.dia/total);
      ctx.beginPath();ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,pieR,angle,angle+slice);
      ctx.closePath();
      ctx.fillStyle=palette[i%palette.length];ctx.fill();
      ctx.strokeStyle='rgba(245,240,234,0.9)';ctx.lineWidth=2;ctx.stroke();
      if(slice>0.15){
        ctx.fillStyle='#fff';ctx.font='bold 13px Arial';ctx.textAlign='center';
        ctx.fillText(row.dia,cx+Math.cos(angle+slice/2)*pieR*0.65,cy+Math.sin(angle+slice/2)*pieR*0.65+5);
      }
      angle+=slice;
    });
  }else{
    ctx.beginPath();ctx.arc(cx,cy,pieR,0,2*Math.PI);
    ctx.fillStyle='rgba(44,37,32,0.08)';ctx.fill();
    ctx.fillStyle='#8a7060';ctx.font='11px Arial';ctx.textAlign='center';
    ctx.fillText('sem dados hoje',cx,cy+4);
  }
  var legX=4;
  var legY=cy-(sorted.length*22)/2;
  if(legY<8)legY=8;
  sorted.forEach(function(row,i){
    ctx.beginPath();ctx.arc(legX+6,legY+6,6,0,2*Math.PI);
    ctx.fillStyle=palette[i%palette.length];ctx.fill();
    ctx.fillStyle='#2C2520';ctx.font='11px Arial';ctx.textAlign='left';
    var nome=row.nome.length>13?row.nome.slice(0,13)+'...':row.nome;
    ctx.fillText(nome+' ('+row.dia+')',legX+16,legY+10);
    legY+=22;
  });
}
function buildMetaTotal(cid,totalDia,meta,color){
  var el=document.getElementById(cid);if(!el)return;
  var pct=meta>0?Math.min(Math.round(totalDia/meta*100),150):0;
  var barColor=pct>=100?'#00B050':pct>=70?'#EF9F27':'#FF0066';
  var metaPos=meta>0?Math.min(100,Math.round(meta/Math.max(meta,totalDia)*100)):100;
  el.innerHTML='<div class="mtb-label">PROGRESSO GERAL — '+totalDia+' / '+meta+' pecas ('+pct+'%)</div><div class="mtb-wrap"><div class="mtb-fill" style="width:'+Math.min(pct,100)+'%;background:'+barColor+'"></div><div class="mtb-line" style="left:'+metaPos+'%"></div><div class="mtb-pct">'+pct+'%</div></div>';
}

function buildMetaMes(cid,totalAc,metaMes){
  var el=document.getElementById(cid);if(!el)return;
  var pct=metaMes>0?Math.min(Math.round(totalAc/metaMes*100),150):0;
  var barColor=pct>=100?'#00B050':pct>=70?'#EF9F27':'#FF0066';
  var metaPos=metaMes>0?Math.min(100,Math.round(metaMes/Math.max(metaMes,totalAc)*100)):100;
  el.innerHTML='<div class="mtb-label">META DO MES — '+totalAc+' / '+metaMes+' pecas ('+pct+'%)</div><div class="mtb-wrap"><div class="mtb-fill" style="width:'+Math.min(pct,100)+'%;background:'+barColor+'"></div><div class="mtb-line" style="left:'+metaPos+'%"></div><div class="mtb-pct">'+pct+'%</div></div>';
}

function buildMetaCol(cid,totalDia,meta,color){
  var el=document.getElementById(cid);if(!el)return;
  var pct=meta>0?Math.min(Math.round(totalDia/meta*100),150):0;
  var barColor=pct>=100?'#00B050':pct>=70?'#EF9F27':'#FF0066';
  var metaPos=meta>0?Math.min(100,Math.round(meta/Math.max(meta,totalDia)*100)):100;
  el.innerHTML='<div style="font-size:11px;color:#6B5A4E;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-weight:600">Meta dia: '+totalDia+' / '+meta+' ('+pct+'%)</div><div style="position:relative;height:8px;background:rgba(44,37,32,0.1);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+Math.min(pct,100)+'%;background:'+barColor+';border-radius:4px;transition:width .8s ease"></div><div style="position:absolute;top:0;height:100%;width:2px;background:rgba(255,255,255,0.4);left:'+metaPos+'%"></div></div>';
}

function diasUteisMes(){
  var hoje=new Date();
  var ano=hoje.getFullYear(),mes=hoje.getMonth();
  var diasNoMes=new Date(ano,mes+1,0).getDate();
  var uteis=0;
  for(var d=1;d<=diasNoMes;d++){
    var dow=new Date(ano,mes,d).getDay();
    if(dow!==0&&dow!==6)uteis++;
  }
  return uteis;
}
function calcMetaMes(setorFiltro){
  var uteis=diasUteisMes();
  var vistos={};
  var total=0;
  Object.keys(COLAB_DATA).forEach(function(nome){
    var cd=COLAB_DATA[nome];
    if(cd&&cd.setor===setorFiltro&&cd.meta>0&&!vistos[nome]){
      vistos[nome]=true;
      total+=cd.meta;
    }
  });
  return total*uteis;
}
function calcMetaMesSubs(subList){
  var uteis=diasUteisMes();
  var vistos={};
  var total=0;
  Object.keys(COLAB_DATA).forEach(function(nome){
    var cd=COLAB_DATA[nome];
    if(cd&&subList.indexOf(cd.sub)!==-1&&cd.meta>0&&!vistos[nome]){
      vistos[nome]=true;
      total+=cd.meta;
    }
  });
  return total*uteis;
}

function calcMetaDiaPessoas(rows){
  return rows.reduce(function(s,r){return s+(getMetaPessoa(r.nome)||35);},0);
}

function buildMetaColMes(cid,totalAc,metaMes){
  var el=document.getElementById(cid);if(!el)return;
  var pct=metaMes>0?Math.min(Math.round(totalAc/metaMes*100),150):0;
  var barColor=pct>=100?'#1a6b3a':pct>=70?'#8a6010':'#8B3A0F';
  var metaPos=metaMes>0?Math.min(100,Math.round(metaMes/Math.max(metaMes,totalAc)*100)):100;
  el.innerHTML='<div style="font-size:9px;color:#6B5A4E;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;font-weight:600">Meta Mês: '+totalAc+' / '+metaMes+' ('+pct+'%)</div><div style="position:relative;height:6px;background:rgba(44,37,32,0.1);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+Math.min(pct,100)+'%;background:'+barColor+';border-radius:3px;transition:width .8s ease"></div><div style="position:absolute;top:0;height:100%;width:2px;background:rgba(44,37,32,0.3);left:'+metaPos+'%"></div></div>';
}

function calcMetaDiaSetor(setorFiltro){
  var total=0;
  Object.keys(COLAB_DATA).forEach(function(nome){
    var cd=COLAB_DATA[nome];
    if(cd&&cd.setor===setorFiltro&&cd.meta>0)total+=cd.meta;
  });
  return total;
}
function calcMetaDiaSubs(subList){
  var total=0;
  Object.keys(COLAB_DATA).forEach(function(nome){
    var cd=COLAB_DATA[nome];
    if(cd&&subList.indexOf(cd.sub)!==-1&&cd.meta>0)total+=cd.meta;
  });
  return total;
}
async function carregarDados(){
  try{
    var r0=await fetch(COLAB_URL);
    if(r0.ok){var csv0=await r0.text();COLAB_DATA=parseColab(csv0);}
    var r1=await fetch(CONFIG_URL);
    if(r1.ok){var csv1=await r1.text();METAS=parseConfig(csv1);}
    var r2=await fetch(LANCAMENTOS_URL);
    if(!r2.ok)throw new Error('HTTP '+r2.status);
    var txt=await r2.text();
    processar(txt);
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('erro').style.display='none';
  }catch(e){
    document.getElementById('loading').style.display='none';
    var er=document.getElementById('erro');
    er.style.display='block';
    er.style.position='fixed';
    er.style.top='60px';
    er.style.left='10px';
    er.style.right='10px';
    er.style.zIndex='9999';
    er.style.padding='20px';
    er.style.fontSize='14px';
    er.innerHTML='<strong style="color:#c00">ERRO AO CARREGAR</strong><br><br>'+e.message+'<br><br><small>Verifique o console (F12)</small>';
    console.error('carregarDados error:',e);
  }
}



var PERIODO='dia';
var ALL_LANCAMENTOS=[];

var SETORES=[
  {nome:'Costura',cor:'#8B3A0F',subs:['Costura'],tipo:'setor'},
  {nome:'Corte',cor:'#1a6b3a',subs:['Corte'],tipo:'setor'},
  {nome:'Marcenaria / CNC / Laminacao Madeira',cor:'#1a5f8a',subs:['Marcenaria','CNC','Laminacao Madeira','Marceneiro'],tipo:'sub'},
  {nome:'Espumacao / Laminacao Espuma',cor:'#8a6010',subs:['Espumacao','Laminacao Espuma'],tipo:'sub'},
  {nome:'Montagem Estrutural / Preparacao',cor:'#7030A0',subs:['Montagem Estrutural','Preparacao'],tipo:'sub'},
  {nome:'Tapecaria',cor:'#1a6b3a',subs:['Tapecaria'],tipo:'setor'},
  {nome:'Montagem Final',cor:'#1a5f8a',subs:['Montagem Final'],tipo:'setor'},
  {nome:'Embalagem',cor:'#8a6010',subs:['Embalagem'],tipo:'setor'},
];

function setPeriodo(p){
  PERIODO=p;
  document.querySelectorAll('.pbtn').forEach(function(b){b.classList.remove('active');});
  event.target.classList.add('active');
  renderRelatorio();
}

function getPeriodoDatas(){
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var ini,fim=new Date(hoje);fim.setHours(23,59,59);
  if(PERIODO==='dia'){
    ini=new Date(hoje);
  }else if(PERIODO==='semana'){
    ini=new Date(hoje);
    var dow=ini.getDay();
    ini.setDate(ini.getDate()-(dow===0?6:dow-1));
  }else{
    ini=new Date(hoje.getFullYear(),hoje.getMonth(),1);
  }
  return{ini:ini,fim:fim};
}

function getPeriodoLabel(){
  var meses=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var hoje=new Date();
  if(PERIODO==='dia') return 'Producao de hoje — '+hoje.getDate()+' de '+meses[hoje.getMonth()]+' de '+hoje.getFullYear();
  if(PERIODO==='semana') return 'Producao desta semana';
  return 'Producao de '+meses[hoje.getMonth()]+' '+hoje.getFullYear();
}

function filtrarPorPeriodo(){
  var d=getPeriodoDatas();
  return ALL_LANCAMENTOS.filter(function(l){
    var dt=parseDate(l.data);
    if(!dt)return false;
    return dt>=d.ini&&dt<=d.fim;
  });
}

function getColabsSetor(setor){
  var lista=[];
  Object.keys(COLAB_DATA).forEach(function(nome){
    var cd=COLAB_DATA[nome];
    if(!cd||cd.meta<=0)return;
    var match=false;
    if(setor.tipo==='setor'){
      setor.subs.forEach(function(s){if(cd.setor===s)match=true;});
    }else{
      setor.subs.forEach(function(s){if(cd.sub===s)match=true;});
    }
    if(match)lista.push({nome:nome,meta:cd.meta,setor:cd.setor,sub:cd.sub});
  });
  return lista;
}

function renderRelatorio(){
  var lans=filtrarPorPeriodo();
  var label=getPeriodoLabel();
  document.getElementById('report-title').textContent='RELATORIO — '+PERIODO.toUpperCase();
  document.getElementById('report-sub').textContent=label;

  var totalProd=0,totalMeta=0,totalColab=0,totalMeta100=0;
  var html='';

  SETORES.forEach(function(setor){
    var colabs=getColabsSetor(setor);
    if(colabs.length===0)return;
    totalColab+=colabs.length;

    var mapProd={};
    lans.forEach(function(l){
      var cd=COLAB_DATA[l.nome];
      if(!cd)return;
      var match=false;
      if(setor.tipo==='setor')setor.subs.forEach(function(s){if(cd.setor===s)match=true;});
      else setor.subs.forEach(function(s){if(cd.sub===s)match=true;});
      if(!match)return;
      if(!mapProd[l.nome])mapProd[l.nome]=0;
      mapProd[l.nome]+=Number(l.prodCorpo)||0;
      if(setor.nome==='Costura'){mapProd[l.nome]+=Number(l.prodAlmof)||0;}
    });

    var setorProd=0,setorMeta=0;
    colabs.forEach(function(c){
      var metaPeriodo=c.meta;
      if(PERIODO==='semana'){
        var dow=new Date().getDay();
        var diasSemana=dow===0?7:(dow===6?6:dow);
        metaPeriodo=c.meta*diasSemana;
      }else if(PERIODO==='mes'){
        metaPeriodo=c.meta*diasUteisMes();
      }
      setorMeta+=metaPeriodo;
      setorProd+=(mapProd[c.nome]||0);
    });
    totalProd+=setorProd;
    totalMeta+=setorMeta;

    var pctSetor=setorMeta>0?Math.round(setorProd/setorMeta*100):0;
    var barColor=pctSetor>=100?'#1a6b3a':pctSetor>=70?'#8a6010':'#8B3A0F';

    html+='<div class="setor-block">';
    html+='<div class="setor-title" style="background:'+setor.cor+';color:#DCCCBE">'+setor.nome.toUpperCase()+'</div>';
    html+='<table class="table">';
    html+='<thead><tr><th style="width:200px">Colaborador</th><th>Sub-setor</th><th style="width:90px;text-align:center">Producao</th><th style="width:90px;text-align:center">Meta</th><th style="width:120px;text-align:center">%</th><th style="width:160px">Progresso</th><th style="width:80px;text-align:center">Status</th></tr></thead>';
    html+='<tbody>';

    colabs.sort(function(a,b){return (mapProd[b.nome]||0)-(mapProd[a.nome]||0);});
    colabs.forEach(function(c){
      var prod=mapProd[c.nome]||0;
      var metaPeriodo=c.meta;
      if(PERIODO==='semana'){var dow=new Date().getDay();metaPeriodo=c.meta*(dow===0?7:(dow===6?6:dow));}
      else if(PERIODO==='mes')metaPeriodo=c.meta*diasUteisMes();
      var pct=metaPeriodo>0?Math.round(prod/metaPeriodo*100):0;
      var pctCap=Math.min(pct,100);
      var bc=pct>=100?'#1a6b3a':pct>=70?'#8a6010':'#8B3A0F';
      var badge=prod===0?'<span class="badge badge-zer">SEM LANCAMENTO</span>':pct>=100?'<span class="badge badge-ok">META &#11088;</span>':'<span class="badge badge-no">'+pct+'%</span>';
      if(pct>=100)totalMeta100++;
      html+='<tr>';
      html+='<td style="font-weight:700">'+c.nome+'</td>';
      html+='<td style="color:#6B5A4E;font-size:11px">'+c.sub+'</td>';
      html+='<td style="text-align:center;font-weight:700;color:'+setor.cor+'">'+prod+'</td>';
      html+='<td style="text-align:center;color:#6B5A4E">'+metaPeriodo+'</td>';
      html+='<td style="text-align:center;font-weight:700;color:'+bc+'">'+pct+'%</td>';
      html+='<td><div class="bar-wrap"><div class="bar-fill" style="width:'+pctCap+'%;background:'+bc+'"></div></div></td>';
      html+='<td style="text-align:center">'+badge+'</td>';
      html+='</tr>';
    });
    html+='<tr style="background:#2C2520!important">';
    html+='<td colspan="2" style="font-weight:700;color:#DCCCBE;font-size:11px;letter-spacing:1px;background:#2C2520">TOTAL DO SETOR</td>';
    html+='<td style="text-align:center;font-weight:700;color:#DCCCBE;background:#2C2520">'+setorProd+'</td>';
    html+='<td style="text-align:center;color:#DCCCBE;background:#2C2520">'+setorMeta+'</td>';
    html+='<td style="text-align:center;font-weight:700;color:'+barColor+';background:#2C2520">'+pctSetor+'%</td>';
    html+='<td colspan="2" style="background:#2C2520"><div class="bar-wrap" style="background:rgba(220,204,190,0.15)"><div class="bar-fill" style="width:'+Math.min(pctSetor,100)+'%;background:'+barColor+'"></div></div></td>';
    html+='</tr>';
    html+='</tbody></table></div>';
  });

  var pctGeral=totalMeta>0?Math.round(totalProd/totalMeta*100):0;
  var summaryHTML='<div class="summary-grid">';
  summaryHTML+='<div class="sum-card" style="border-color:#8B3A0F"><div class="sum-label">Total Produzido</div><div class="sum-val" style="color:#8B3A0F">'+totalProd+'</div><div class="sum-sub">pecas no periodo</div></div>';
  summaryHTML+='<div class="sum-card" style="border-color:#1a5f8a"><div class="sum-label">Meta do Periodo</div><div class="sum-val" style="color:#1a5f8a">'+totalMeta+'</div><div class="sum-sub">pecas esperadas</div></div>';
  summaryHTML+='<div class="sum-card" style="border-color:'+(pctGeral>=100?'#1a6b3a':pctGeral>=70?'#8a6010':'#8B3A0F')+'"><div class="sum-label">Desempenho Geral</div><div class="sum-val" style="color:'+(pctGeral>=100?'#1a6b3a':pctGeral>=70?'#8a6010':'#8B3A0F')+'">'+pctGeral+'%</div><div class="sum-sub">da meta atingida</div></div>';
  summaryHTML+='<div class="sum-card" style="border-color:#7030A0"><div class="sum-label">Meta 100%</div><div class="sum-val" style="color:#7030A0">'+totalMeta100+'</div><div class="sum-sub">colaboradores</div></div>';
  summaryHTML+='</div>';

  document.getElementById('app').innerHTML=summaryHTML+html;
}

async function carregarDados(){
  document.getElementById('app').innerHTML='<div class="loading-msg"><div class="spinner"></div>Carregando dados...</div>';
  try{
    var r0=await fetch(COLAB_URL);
    if(r0.ok){COLAB_DATA=parseColab(await r0.text());}
    var r1=await fetch(CONFIG_URL);
    if(r1.ok){METAS=parseConfig(await r1.text());}
    var r2=await fetch(LANCAMENTOS_URL);
    if(!r2.ok)throw new Error('HTTP '+r2.status);
    var txt=await r2.text();
    var linhas=txt.split('\n').filter(function(l){return l.trim();});
    ALL_LANCAMENTOS=[];
    for(var i=3;i<linhas.length;i++){
      var c=parseCSVLine(linhas[i]);
      if(!c[0]||!c[1])continue;
      ALL_LANCAMENTOS.push({data:c[0],nome:c[1],setor:c[2],prodCorpo:c[3],prodAlmof:c[4],retrabalho:c[5]});
    }
    renderRelatorio();
  }catch(e){
    document.getElementById('app').innerHTML='<div class="loading-msg" style="color:#8B3A0F">Erro: '+e.message+'</div>';
  }
}
carregarDados();
</script>
</body>
