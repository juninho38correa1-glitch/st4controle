<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Relatorio de Producao — Studyo4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:Arial,sans-serif;background:#F5F0EA;color:#2C2520}
.page{max-width:1100px;margin:0 auto;padding:20px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:2px solid #2C2520;margin-bottom:16px}
.logo{font-size:14px;font-weight:700;letter-spacing:3px;color:#2C2520}
.logo span{font-weight:400;letter-spacing:2px;color:#6B5A4E}
.nav-abas{display:flex;border-bottom:2px solid rgba(44,37,32,0.2);margin-bottom:16px}
.abtn{font-size:12px;font-weight:700;letter-spacing:2px;padding:10px 28px;border:none;background:transparent;color:#8a7060;cursor:pointer;text-transform:uppercase;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.abtn.active{color:#2C2520;border-bottom-color:#2C2520}
.controls-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.report-title{font-size:20px;font-weight:700;color:#2C2520}
.report-sub{font-size:11px;color:#6B5A4E;margin-top:3px;letter-spacing:1px}
.pbtn{font-size:11px;font-weight:700;letter-spacing:1px;padding:7px 18px;border:1px solid rgba(44,37,32,0.3);background:transparent;color:#2C2520;cursor:pointer;text-transform:uppercase;transition:all .2s}
.pbtn.active,.pbtn:hover{background:#2C2520;color:#DCCCBE;border-color:#2C2520}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.sum-card{background:#DCCCBE;padding:14px 16px;border-left:4px solid}
.sum-label{font-size:9px;font-weight:700;letter-spacing:2px;color:#6B5A4E;text-transform:uppercase;margin-bottom:4px}
.sum-val{font-size:28px;font-weight:700;line-height:1}
.sum-sub{font-size:10px;color:#6B5A4E;margin-top:3px}
.setor-block{margin-bottom:20px}
.setor-title{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:8px 14px;margin-bottom:1px;display:flex;justify-content:space-between;align-items:center}
.table{width:100%;border-collapse:collapse}
.table th{background:#2C2520;color:#DCCCBE;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 10px;text-align:left}
.table td{padding:8px 10px;font-size:12px;border-bottom:1px solid rgba(44,37,32,0.08);background:#E8E0D5}
.table tr:nth-child(even) td{background:#DCCCBE}
.table tr:hover td{background:#d4c4b0}
.bar-wrap{width:100%;height:7px;background:rgba(44,37,32,0.1);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap}
.badge-ok{background:rgba(26,107,58,0.15);color:#1a6b3a;border:1px solid rgba(26,107,58,0.3)}
.badge-no{background:rgba(139,58,15,0.1);color:#8B3A0F;border:1px solid rgba(139,58,15,0.2)}
.badge-zer{background:rgba(44,37,32,0.08);color:#8a7060;border:1px solid rgba(44,37,32,0.15)}
.loading-msg{text-align:center;padding:60px;font-size:13px;letter-spacing:2px;color:#6B5A4E;text-transform:uppercase}
.spinner{width:36px;height:36px;border:2px solid rgba(44,37,32,0.15);border-top-color:#8B3A0F;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.print-btn{font-size:11px;font-weight:700;letter-spacing:2px;padding:7px 18px;border:1px solid #1a6b3a;background:transparent;color:#1a6b3a;cursor:pointer;text-transform:uppercase;transition:all .2s}
.print-btn:hover{background:#1a6b3a;color:#fff}
.back-btn{font-size:11px;font-weight:700;letter-spacing:2px;padding:6px 16px;border:1px solid rgba(44,37,32,0.3);background:transparent;color:#2C2520;cursor:pointer;text-decoration:none;text-transform:uppercase}
.back-btn:hover{background:#2C2520;color:#DCCCBE}
.footer{text-align:center;padding:20px 0;font-size:10px;color:#8a7060;border-top:1px solid rgba(44,37,32,0.15);margin-top:24px}

@media (max-width: 768px){
  .page{padding:12px}
  .topbar{flex-direction:column;align-items:flex-start;gap:10px}
  .summary-grid{grid-template-columns:1fr 1fr}
  .controls-row{flex-direction:column;align-items:flex-start;gap:10px}
  .table th,.table td{padding:6px 8px;font-size:11px}
  .nav-abas{overflow-x:auto}
  .abtn{padding:8px 16px;font-size:11px;white-space:nowrap}
  .sum-val{font-size:22px}
  .pbtn{padding:6px 12px;font-size:10px}
}
@page{
  margin-top:10mm;
  margin-bottom:10mm;
  margin-left:10mm;
  margin-right:10mm;
}
@media print{
  @page{margin:10mm;size:A4}
  head{display:none}
  .no-print{display:none!important}body{background:#fff}.page{padding:10px}.sum-card,.table th,.setor-title{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div>
      <div class="logo">STUDYO4 <span>ESTOFADOS</span></div>
      <div style="font-size:10px;color:#6B5A4E;margin-top:3px;letter-spacing:1px">RELATORIO DE PRODUCAO</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center" class="no-print">
      <button class="print-btn" onclick="window.print()">Exportar PDF</button>
      <a href="index.html" class="back-btn">&larr; Voltar</a>
    </div>
  </div>
  <div class="nav-abas no-print">
    <button class="abtn active" id="abtn-relatorio" onclick="setAba('relatorio')">Relatório</button>
    <button class="abtn" id="abtn-graficos" onclick="setAba('graficos')">Gráficos</button>
    <button class="abtn" id="abtn-individual" onclick="setAba('individual')">Análise Individual</button>
  </div>
  <div class="controls-row">
    <div>
      <div class="report-title" id="report-title">RELATÓRIO</div>
      <div class="report-sub" id="report-sub">Carregando...</div>
      <div id="dias-uteis-info" style="font-size:10px;color:#8a7060;margin-top:3px;letter-spacing:1px"></div>
    </div>
    <div id="periodo-row" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap" class="no-print">
      <button class="pbtn active" id="pbtn-dia" onclick="setPeriodo('dia')">Hoje</button>
      <button class="pbtn" id="pbtn-semana" onclick="setPeriodo('semana')">Semana</button>
      <button class="pbtn" id="pbtn-mes" onclick="setPeriodo('mes')">Mês Atual</button>
      <button class="pbtn" onclick="mostrarSelectMes()" title="Escolher mês específico">&#128197; Outro Mês</button>
      <div id="sel-container" style="display:none;display:none;gap:4px;align-items:center">
        <select id="sel-mes" onchange="setMesSelecionado()" style="font-size:11px;font-weight:700;letter-spacing:1px;padding:7px 12px;border:1px solid rgba(44,37,32,0.3);background:#F5F0EA;color:#2C2520;cursor:pointer;outline:none">
          <option value="">Mês</option>
          <option value="0">Janeiro</option>
          <option value="1">Fevereiro</option>
          <option value="2">Março</option>
          <option value="3">Abril</option>
          <option value="4">Maio</option>
          <option value="5">Junho</option>
          <option value="6">Julho</option>
          <option value="7">Agosto</option>
          <option value="8">Setembro</option>
          <option value="9">Outubro</option>
          <option value="10">Novembro</option>
          <option value="11">Dezembro</option>
        </select>
        <select id="sel-ano" onchange="setMesSelecionado()" style="font-size:11px;font-weight:700;letter-spacing:1px;padding:7px 12px;border:1px solid rgba(44,37,32,0.3);background:#F5F0EA;color:#2C2520;cursor:pointer;outline:none">
        </select>
      </div>
    </div>
  </div>
  <div id="app"><div class="loading-msg"><div class="spinner"></div>Carregando dados...</div></div>
  <div class="footer">&copy; Junior Corr&ecirc;a &middot; Todos os direitos reservados &middot; STUDYO4 Estofados</div>
</div>
<script>

var LANCAMENTOS_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSu6isVwVIjZKgzu5SvgBip8Xu7kHPelQJqz96JgN9gDXcNIn09xWdhkGeipQ0RwDDDhxZkU2sEP0bp/pub?gid=1405226140&single=true&output=csv';
var COLAB_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSu6isVwVIjZKgzu5SvgBip8Xu7kHPelQJqz96JgN9gDXcNIn09xWdhkGeipQ0RwDDDhxZkU2sEP0bp/pub?gid=1534833771&single=true&output=csv';
var PERIODO='dia';
var MES_SEL=null;
var ANO_SEL=new Date().getFullYear();
var ABA='relatorio';
var ALL_LANCAMENTOS=[];
var COLAB_DATA={};

function parseCSVLine(line){var r=[],cur='',inQ=false;for(var i=0;i<line.length;i++){if(line[i]==='"'){inQ=!inQ;}else if(line[i]===','&&!inQ){r.push(cur.trim().replace(/^"|"$/g,''));cur='';}else if(line[i]!=='"'){cur+=line[i];}}r.push(cur.trim().replace(/^"|"$/g,''));return r;}
function parseDate(str){if(!str)return null;str=str.trim();var parts,d,m,y,sl=str.indexOf('/'),da=str.indexOf('-');if(sl!==-1){parts=str.split('/');if(parts[2]&&parts[2].length===4){d=+parts[0];m=+parts[1];y=+parts[2];}else{m=+parts[0];d=+parts[1];y=+parts[2];}}else if(da!==-1){parts=str.split('-');y=+parts[0];m=+parts[1];d=+parts[2];}else return null;if(!y||!m||!d)return null;return new Date(y,m-1,d);}
function parseColab(csv){var linhas=csv.split('\n').filter(function(l){return l.trim();});var map={};for(var i=2;i<linhas.length;i++){var c=parseCSVLine(linhas[i]);if(!c[0])continue;map[c[0].trim()]={setor:c[1]?c[1].trim():'',sub:c[2]?c[2].trim():'',meta:Number(c[3])||0,tv:c[4]?c[4].trim():''};}return map;}
function diasUteisSemanAte(){
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var dow=hoje.getDay();
  var seg=new Date(hoje);
  seg.setDate(hoje.getDate()-(dow===0?6:dow-1));
  var u=0;
  for(var d=new Date(seg);d<=hoje;d.setDate(d.getDate()+1)){
    var dw=d.getDay();
    if(dw>=1&&dw<=5)u++;
  }
  return u;
}
function diasUteisMes(){var hoje=new Date();var ano=hoje.getFullYear(),mes=hoje.getMonth();var total=new Date(ano,mes+1,0).getDate();var u=0;for(var d=1;d<=total;d++){var dow=new Date(ano,mes,d).getDay();if(dow!==0&&dow!==6)u++;}return u;}

function setAba(a){
  ABA=a;
  document.querySelectorAll('.abtn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('abtn-'+a).classList.add('active');
  var pr=document.getElementById('periodo-row');
  if(pr)pr.style.display=(a==='individual')?'none':'flex';
  render();
}
function setPeriodo(p){
  PERIODO=p;
  MES_SEL=null;
  _abcClasseFiltro=null;
  document.querySelectorAll('.pbtn').forEach(function(b){b.classList.remove('active');});
  event.target.classList.add('active');
  var cont=document.getElementById('sel-container');
  if(cont){cont.style.display='none';}
  var selMes=document.getElementById('sel-mes');
  if(selMes)selMes.value='';
  render();
}
function setMesSelecionado(){
  var selMes=document.getElementById('sel-mes');
  var selAno=document.getElementById('sel-ano');
  if(!selMes||selMes.value==='')return;
  MES_SEL=parseInt(selMes.value);
  ANO_SEL=selAno&&selAno.value?parseInt(selAno.value):new Date().getFullYear();
  PERIODO='mesEspec';
  document.querySelectorAll('.pbtn').forEach(function(b){b.classList.remove('active');});
  render();
}
function mostrarSelectMes(){
  var cont=document.getElementById('sel-container');
  if(!cont)return;
  cont.style.display='flex';
  // Preencher anos: de 2024 até ano atual
  var selAno=document.getElementById('sel-ano');
  if(selAno&&selAno.options.length<=1){
    var anoAtual=new Date().getFullYear();
    for(var a=anoAtual;a>=2024;a--){
      var opt=document.createElement('option');
      opt.value=a;opt.textContent=a;
      if(a===anoAtual)opt.selected=true;
      selAno.appendChild(opt);
    }
  }
}
function render(){
  // Atualizar info de dias úteis
  var info=document.getElementById('dias-uteis-info');
  if(info){
    var du=0;
    if(PERIODO==='dia'){du=1;}
    else if(PERIODO==='semana'){du=diasUteisSemanAte();}
    else if(PERIODO==='mesEspec'&&MES_SEL!==null){du=diasUteisMesEspec(MES_SEL,ANO_SEL);}
    else{du=diasUteisMes();}
    var meses=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    if(PERIODO==='dia'){info.textContent='';}
    else if(PERIODO==='semana'){info.textContent=du+' dias úteis esta semana';}
    else if(PERIODO==='mesEspec'&&MES_SEL!==null){info.textContent=du+' dias úteis em '+meses[MES_SEL]+' '+ANO_SEL;}
    else{var hoje=new Date();info.textContent=du+' dias úteis em '+meses[hoje.getMonth()]+' '+hoje.getFullYear();}
  }
  if(ABA==='relatorio')renderRelatorio();else if(ABA==='graficos')renderGraficos();else renderIndividual();
}

function getPeriodoDatas(){
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var ini,fim=new Date(hoje);fim.setHours(23,59,59);
  if(PERIODO==='dia'){ini=new Date(hoje);}
  else if(PERIODO==='semana'){ini=new Date(hoje);var dow=ini.getDay();ini.setDate(ini.getDate()-(dow===0?6:dow-1));}
  else if(PERIODO==='mesEspec'&&MES_SEL!==null){
    ini=new Date(ANO_SEL,MES_SEL,1);
    fim=new Date(ANO_SEL,MES_SEL+1,0);fim.setHours(23,59,59);
  }else{ini=new Date(hoje.getFullYear(),hoje.getMonth(),1);}
  return{ini:ini,fim:fim};
}
function getPeriodoLabel(){
  var meses=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var hoje=new Date();
  if(PERIODO==='dia')return 'Producao de hoje \u2014 '+hoje.getDate()+' de '+meses[hoje.getMonth()]+' de '+hoje.getFullYear();
  if(PERIODO==='semana')return 'Producao desta semana';
  return 'Producao de '+meses[hoje.getMonth()]+' '+hoje.getFullYear();
}
function diasUteisMesEspec(mes,ano){
  var total=new Date(ano,mes+1,0).getDate();var u=0;
  for(var d=1;d<=total;d++){var dow=new Date(ano,mes,d).getDay();if(dow!==0&&dow!==6)u++;}
  return u;
}
function getMetaPeriodo(meta){
  if(PERIODO==='dia')return meta;
  if(PERIODO==='semana')return meta*diasUteisSemanAte();
  if(PERIODO==='mesEspec'&&MES_SEL!==null)return meta*diasUteisMesEspec(MES_SEL,ANO_SEL);
  return meta*diasUteisMes();
}
function getLansPeriodo(){
  var d=getPeriodoDatas();
  return ALL_LANCAMENTOS.filter(function(l){var dt=parseDate(l.data);return dt&&dt>=d.ini&&dt<=d.fim;});
}
function getClasse(pct){return pct>=80?'A':pct>=50?'B':'C';}
function getClasseCor(cl){return cl==='A'?'#1a6b3a':cl==='B'?'#8a6010':'#8B3A0F';}
function getCor(setor){
  var PALETA=[
    '#8B3A0F','#1a6b3a','#1a5f8a','#8a6010','#7030A0',
    '#5B3A8B','#1a7a6a','#8B5A2B','#2C6B8A','#6B3A8B',
    '#8B6A1a','#3A8B5A','#8B2C6B','#1a8B6A','#6A8B1a'
  ];
  if(!getCor._map)getCor._map={};
  if(!getCor._idx)getCor._idx=0;
  if(!setor)return PALETA[0];
  var key=setor.trim().toLowerCase();
  if(!getCor._map[key]){
    getCor._map[key]=PALETA[getCor._idx%PALETA.length];
    getCor._idx++;
  }
  return getCor._map[key];
}

function buildSetores(){
  var map={};
  Object.keys(COLAB_DATA).forEach(function(nome){
    var cd=COLAB_DATA[nome];if(!cd||!cd.setor)return;
    var s=cd.setor;if(!map[s])map[s]=[];map[s].push(nome);
  });
  return map;
}

function calcProd(nome,lans){
  var cd=COLAB_DATA[nome];if(!cd)return 0;
  var isCos=cd.setor==='Costura';var t=0;
  lans.forEach(function(l){
    if(l.nome!==nome)return;
    t+=Number(l.prodCorpo)||0;
    if(isCos)t+=Number(l.prodAlmof)||0;
  });
  return t;
}
function calcProdCorpo(nome,lans){var t=0;lans.forEach(function(l){if(l.nome===nome)t+=Number(l.prodCorpo)||0;});return t;}
function calcProdAlmof(nome,lans){var t=0;lans.forEach(function(l){if(l.nome===nome)t+=Number(l.prodAlmof)||0;});return t;}

// ── RELATÓRIO ─────────────────────────────────────────────
function renderRelatorio(){
  document.getElementById('report-sub').textContent=getPeriodoLabel();
  var lans=getLansPeriodo();
  var setoresMap=buildSetores();
  var totalProd=0,totalMeta=0,totalA=0,totalB=0,totalC=0;
  var html='';

  Object.keys(setoresMap).sort().forEach(function(setor){
    var colabs=setoresMap[setor];
    var cor=getCor(setor);
    var isCos=setor==='Costura';
    var setorProd=0,setorMeta=0;
    colabs.forEach(function(nome){
      var cd=COLAB_DATA[nome];if(!cd)return;
      setorProd+=calcProd(nome,lans);
      setorMeta+=getMetaPeriodo(cd.meta);
    });
    totalProd+=setorProd;totalMeta+=setorMeta;
    var pctS=setorMeta>0?Math.round(setorProd/setorMeta*100):0;
    var barColor=pctS>=100?'#1a6b3a':pctS>=70?'#8a6010':'#8B3A0F';

    html+='<div class="setor-block">';
    html+='<div class="setor-title" style="background:'+cor+';color:#DCCCBE">';
    html+=setor.toUpperCase();
    html+='<span style="font-size:10px;opacity:0.85">'+setorProd+' / '+setorMeta+' pcs ('+pctS+'%)</span></div>';
    html+='<table class="table"><thead><tr>';
    html+='<th style="width:30px;text-align:center">ABC</th>';
    html+='<th style="width:200px">Colaborador</th>';
    html+='<th>Sub-setor</th>';
    if(isCos){html+='<th style="width:70px;text-align:center;color:#c8845a">Corpo</th><th style="width:70px;text-align:center;color:#7BA3C4">Almofada</th><th style="width:70px;text-align:center">Total</th>';}
    else{html+='<th style="width:80px;text-align:center">Prod.</th>';}
    html+='<th style="width:70px;text-align:center">Meta</th><th style="width:70px;text-align:center">%</th><th>Progresso</th><th style="width:110px;text-align:center">Status</th>';
    html+='</tr></thead><tbody>';

    colabs.sort(function(a,b){
      var cd_a=COLAB_DATA[a];var cd_b=COLAB_DATA[b];
      var ma=cd_a&&cd_a.meta>0?getMetaPeriodo(cd_a.meta):0;
      var mb=cd_b&&cd_b.meta>0?getMetaPeriodo(cd_b.meta):0;
      var pa=ma>0?calcProd(a,lans)/ma:0;
      var pb=mb>0?calcProd(b,lans)/mb:0;
      return pb-pa;
    });

    colabs.forEach(function(nome){
      var cd=COLAB_DATA[nome];if(!cd)return;
      var prod=calcProd(nome,lans);
      var corpo=calcProdCorpo(nome,lans);
      var almof=calcProdAlmof(nome,lans);
      var meta=getMetaPeriodo(cd.meta);
      var pct=meta>0?Math.round(prod/meta*100):0;
      var pctCap=Math.min(pct,100);
      var bc=pct>=100?'#1a6b3a':pct>=70?'#8a6010':'#8B3A0F';
      var classe=cd.meta>0?getClasse(pct):'—';
      var classeCor=cd.meta>0?getClasseCor(classe):'#8a7060';
      var classeBg=classe==='A'?'rgba(26,107,58,0.12)':classe==='B'?'rgba(138,96,16,0.12)':classe==='C'?'rgba(139,58,15,0.1)':'rgba(44,37,32,0.05)';
      if(cd.meta>0){if(classe==='A')totalA++;else if(classe==='B')totalB++;else totalC++;}
      var badge=cd.meta<=0?'<span class="badge badge-zer">S/ META</span>':prod===0?'<span class="badge badge-zer">SEM LAN\u00c7AMENTO</span>':pct>=100?'<span class="badge badge-ok">META \u2B50</span>':'<span class="badge badge-no">'+pct+'%</span>';
      html+='<tr>';
      html+='<td style="text-align:center"><span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;background:'+classeBg+';color:'+classeCor+'">'+classe+'</span></td>';
      html+='<td style="font-weight:700">'+nomeLimpo(nome)+'</td>';
      html+='<td style="color:#6B5A4E;font-size:11px">'+cd.sub+'</td>';

function nomeLimpo(nome){
  if(!nome)return '';
  return nome.replace(/_[A-Za-z0-9]+$/,'').trim();
}
function nomeCurto(n,m){if(!n)return '';var p=n.trim().split(' ');var r=p[0];for(var i=1;i<p.length;i++){var t=r+' '+p[i];if(t.length<=m)r=t;else{r=r+'...';break;}}return r;}

function renderGraficos(){
  document.getElementById('report-sub').textContent=getPeriodoLabel();
  var lans=getLansPeriodo();
  var setoresMap=buildSetores();

  var blocos=[];
  Object.keys(setoresMap).sort().forEach(function(setor){
    var colabs=setoresMap[setor];
    var isCos=setor==='Costura';
    var dados=colabs.map(function(nome){
      var cd=COLAB_DATA[nome];if(!cd)return null;
      var prod=calcProd(nome,lans);
      var meta=getMetaPeriodo(cd.meta);
      var pct=meta>0?Math.round(prod/meta*100):0;
      return{nome:nome,prod:prod,meta:meta,pct:pct,classe:cd.meta>0?getClasse(pct):'—',cor:getCor(setor)};
    }).filter(Boolean);
    dados.sort(function(a,b){return b.pct-a.pct;});
    if(dados.length>0)blocos.push({setor:setor,cor:getCor(setor),colabs:dados});
  });
  _abcBlocosCache=blocos; // salvar globalmente para o toggleClasseFiltro

  var hoje=new Date();
  var diasMes=[];
  for(var d=new Date(hoje.getFullYear(),hoje.getMonth(),1);d<=hoje;d.setDate(d.getDate()+1)){
    if(d.getDay()>0&&d.getDay()<6)diasMes.push(new Date(d));
  }
  var prodPorDia={};
  diasMes.forEach(function(d){prodPorDia[d.toDateString()]=0;});
  ALL_LANCAMENTOS.forEach(function(l){
    var dt=parseDate(l.data);if(!dt)return;
    var key=dt.toDateString();if(prodPorDia[key]===undefined)return;
    var cd=COLAB_DATA[l.nome];if(!cd)return;
    var isCos=cd.setor==='Costura';
    prodPorDia[key]+=isCos?((Number(l.prodCorpo)||0)+(Number(l.prodAlmof)||0)):(Number(l.prodCorpo)||0);
  });
  var mediaDia=diasMes.length>0?Math.round(Object.values(prodPorDia).reduce(function(s,v){return s+v;},0)/diasMes.length):0;

  var allColabs=[];blocos.forEach(function(b){b.colabs.forEach(function(c){if(c.meta>0)allColabs.push(c);});});
  var nA=allColabs.filter(function(c){return c.classe==='A';}).length;
  var nB=allColabs.filter(function(c){return c.classe==='B';}).length;
  var nC=allColabs.filter(function(c){return c.classe==='C';}).length;

  var html='<div class="summary-grid">';
  html+='<div class="sum-card" id="sum-card-A" style="border-color:#1a6b3a;cursor:pointer;transition:all .2s" onclick="toggleClasseFiltro(\'A\')"><div class="sum-label">Classe A (&ge;80%)</div><div class="sum-val" style="color:#1a6b3a">'+nA+'</div><div class="sum-sub">colaboradores &nbsp;▼</div></div>';
  html+='<div class="sum-card" id="sum-card-B" style="border-color:#8a6010;cursor:pointer;transition:all .2s" onclick="toggleClasseFiltro(\'B\')"><div class="sum-label">Classe B (50-79%)</div><div class="sum-val" style="color:#8a6010">'+nB+'</div><div class="sum-sub">colaboradores &nbsp;▼</div></div>';
  html+='<div class="sum-card" id="sum-card-C" style="border-color:#8B3A0F;cursor:pointer;transition:all .2s" onclick="toggleClasseFiltro(\'C\')"><div class="sum-label">Classe C (&lt;50%)</div><div class="sum-val" style="color:#8B3A0F">'+nC+'</div><div class="sum-sub">colaboradores &nbsp;▼</div></div>';
  html+='<div class="sum-card" style="border-color:#1a5f8a"><div class="sum-label">Media Diaria Mes</div><div class="sum-val" style="color:#1a5f8a">'+mediaDia+'</div><div class="sum-sub">pecas/dia util</div></div>';
  html+='</div>';
  html+='<div id="abc-detalhe-painel" style="display:none;background:#DCCCBE;padding:16px;margin-bottom:16px;border-left:4px solid #2C2520"></div>';

  blocos.forEach(function(b,bi){
    if(b.colabs.length===0)return;
    html+='<div style="background:#DCCCBE;padding:16px;margin-bottom:14px">';
    html+='<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:'+b.cor+';text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid '+b.cor+'">// Curva ABC \u2014 '+b.setor+'</div>';
    html+='<canvas id="gabc-'+bi+'" style="width:100%;height:140px"></canvas></div>';
  });

  html+='<div style="background:#DCCCBE;padding:16px;margin-bottom:14px">';
  html+='<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:#1a5f8a;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #1a5f8a">// Evolucao Diaria do Mes</div>';
  html+='<canvas id="g-evolucao" style="width:100%;height:180px"></canvas></div>';

  html+='<div style="background:#DCCCBE;padding:16px;margin-bottom:14px">';
  html+='<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:#2C2520;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #2C2520">// Meta vs Realizado por Setor</div>';
  html+='<canvas id="g-setores" style="width:100%;height:200px"></canvas></div>';

  document.getElementById('app').innerHTML=html;

  setTimeout(function(){
    blocos.forEach(function(b,bi){drawABC('gabc-'+bi,b.colabs,b.cor);});
    drawEvolucao(diasMes,prodPorDia);
    drawSetores(blocos,lans);
  },80);
}

function drawABC(id,colabs,cor){
  var canvas=document.getElementById(id);if(!canvas||!colabs.length)return;
  var W=canvas.offsetWidth;var H=140;canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  var ml=36,mr=16,mt=16,mb=46,cW=W-ml-mr,cH=H-mt-mb;
  var n=colabs.length;var bW=Math.max(6,Math.floor(cW/n)-3);
  [0,50,80,100].forEach(function(pct){
    var y=mt+cH-(cH*pct/100);
    ctx.strokeStyle=pct===50||pct===80?'rgba(44,37,32,0.2)':'rgba(44,37,32,0.08)';
    ctx.lineWidth=1;ctx.setLineDash(pct===50||pct===80?[3,3]:[]);
    ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(ml+cW,y);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#6B5A4E';ctx.font='8px Arial';ctx.textAlign='right';ctx.fillText(pct+'%',ml-3,y+3);
  });
  colabs.forEach(function(c,i){
    var x=ml+i*(bW+3);var pctC=Math.min(c.pct,100);var bH=Math.round((pctC/100)*cH);var y=mt+cH-bH;
    var col=getClasseCor(c.classe);
    ctx.fillStyle=col;ctx.fillRect(x,y,bW,bH);
    if(c.pct>0){ctx.fillStyle='#2C2520';ctx.font='bold 8px Arial';ctx.textAlign='center';ctx.fillText(c.pct+'%',x+bW/2,y-3);}
    ctx.fillStyle=c.classe==='A'?'rgba(26,107,58,0.15)':c.classe==='B'?'rgba(138,96,16,0.15)':'rgba(139,58,15,0.12)';
    ctx.fillRect(x,mt+cH+2,bW,9);
    ctx.fillStyle=col;ctx.font='bold 7px Arial';ctx.textAlign='center';ctx.fillText(c.classe,x+bW/2,mt+cH+10);
    ctx.save();ctx.translate(x+bW/2,mt+cH+15);ctx.rotate(-Math.PI/4);
    ctx.fillStyle='#6B5A4E';ctx.font='8px Arial';ctx.textAlign='right';ctx.fillText(nomeCurto(nomeLimpo(c.nome),10),0,0);ctx.restore();
  });
}

function drawEvolucao(dias,prodPorDia){
  var canvas=document.getElementById('g-evolucao');if(!canvas)return;
  var W=canvas.offsetWidth;var H=180;canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  if(!dias.length)return;
  var ml=40,mr=20,mt=16,mb=24,cW=W-ml-mr,cH=H-mt-mb;
  var vals=dias.map(function(d){return prodPorDia[d.toDateString()]||0;});
  var maxV=Math.max.apply(null,vals)||1;var step=cW/(dias.length-1||1);
  [0,25,50,75,100].forEach(function(pct){
    var y=mt+cH-(cH*pct/100);ctx.strokeStyle='rgba(44,37,32,0.08)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(ml+cW,y);ctx.stroke();
    ctx.fillStyle='#6B5A4E';ctx.font='8px Arial';ctx.textAlign='right';ctx.fillText(Math.round(maxV*pct/100),ml-3,y+3);
  });
  ctx.beginPath();ctx.moveTo(ml,mt+cH);
  dias.forEach(function(d,i){ctx.lineTo(ml+i*step,mt+cH-Math.round((vals[i]/maxV)*cH));});
  ctx.lineTo(ml+(dias.length-1)*step,mt+cH);ctx.closePath();ctx.fillStyle='rgba(26,95,138,0.12)';ctx.fill();
  ctx.strokeStyle='#1a5f8a';ctx.lineWidth=2;ctx.beginPath();
  dias.forEach(function(d,i){var x=ml+i*step;var y=mt+cH-Math.round((vals[i]/maxV)*cH);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});ctx.stroke();
  dias.forEach(function(d,i){
    var x=ml+i*step;var y=mt+cH-Math.round((vals[i]/maxV)*cH);
    ctx.beginPath();ctx.arc(x,y,3,0,2*Math.PI);ctx.fillStyle='#1a5f8a';ctx.fill();
    if(vals[i]>0){ctx.fillStyle='#2C2520';ctx.font='bold 8px Arial';ctx.textAlign='center';ctx.fillText(vals[i],x,y-6);}
    ctx.fillStyle='#6B5A4E';ctx.font='8px Arial';ctx.textAlign='center';ctx.fillText(d.getDate(),x,mt+cH+14);
  });
}

function drawSetores(blocos,lans){
  var canvas=document.getElementById('g-setores');if(!canvas)return;
  var W=canvas.offsetWidth;var H=200;canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  var ml=40,mr=20,mt=16,mb=56,cW=W-ml-mr,cH=H-mt-mb;
  var data=blocos.map(function(b){
    var prod=b.colabs.reduce(function(s,c){return s+c.prod;},0);
    var meta=b.colabs.reduce(function(s,c){return s+c.meta;},0);
    return{nome:b.setor,cor:b.cor,prod:prod,meta:meta,pct:meta>0?Math.round(prod/meta*100):0};
  }).filter(function(d){return d.meta>0;});
  if(!data.length)return;
  var maxV=Math.max.apply(null,data.map(function(d){return Math.max(d.prod,d.meta);}));
  var groupW=cW/data.length;var bW=Math.min(26,groupW*0.35);
  [0,25,50,75,100].forEach(function(pct){
    var y=mt+cH-(cH*pct/100);ctx.strokeStyle='rgba(44,37,32,0.08)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(ml+cW,y);ctx.stroke();
    ctx.fillStyle='#6B5A4E';ctx.font='8px Arial';ctx.textAlign='right';ctx.fillText(Math.round(maxV*pct/100),ml-3,y+3);
  });
  data.forEach(function(s,i){
    var cx=ml+i*groupW+groupW/2;
    var metaH=maxV>0?Math.round((s.meta/maxV)*cH):0;var prodH=maxV>0?Math.round((s.prod/maxV)*cH):0;
    ctx.fillStyle='rgba(44,37,32,0.12)';ctx.fillRect(cx-bW-2,mt+cH-metaH,bW,metaH);
    ctx.fillStyle=s.cor;ctx.fillRect(cx+2,mt+cH-prodH,bW,prodH);
    if(s.meta>0){ctx.fillStyle='rgba(44,37,32,0.4)';ctx.font='8px Arial';ctx.textAlign='center';ctx.fillText(s.meta,cx-bW/2-2,mt+cH-metaH-4);}
    if(s.prod>0){ctx.fillStyle=s.cor;ctx.font='bold 8px Arial';ctx.textAlign='center';ctx.fillText(s.prod,cx+bW/2+2,mt+cH-prodH-4);}
    var bc=s.pct>=80?'#1a6b3a':s.pct>=50?'#8a6010':'#8B3A0F';
    ctx.fillStyle=bc;ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.fillText(s.pct+'%',cx,mt+cH-Math.max(metaH,prodH)-14);
    ctx.save();ctx.translate(cx,mt+cH+8);ctx.rotate(-Math.PI/5);
    ctx.fillStyle='#6B5A4E';ctx.font='8px Arial';ctx.textAlign='right';ctx.fillText(s.nome.slice(0,14),0,0);ctx.restore();
  });
  var lx=ml+cW-100;
  ctx.fillStyle='rgba(44,37,32,0.15)';ctx.fillRect(lx,mt,12,8);
  ctx.fillStyle='#6B5A4E';ctx.font='8px Arial';ctx.textAlign='left';ctx.fillText('Meta',lx+15,mt+8);
  ctx.fillStyle='#8B3A0F';ctx.fillRect(lx,mt+14,12,8);ctx.fillText('Realizado',lx+15,mt+22);
}

var _abcClasseFiltro=null;
var _abcBlocosCache=[];  // variável GLOBAL para os blocos

function toggleClasseFiltro(classe){
  _abcClasseFiltro=(_abcClasseFiltro===classe)?null:classe;
  ['A','B','C'].forEach(function(cl){
    var card=document.getElementById('sum-card-'+cl);
    if(!card)return;
    var ativo=_abcClasseFiltro===cl;
    card.style.opacity=(!_abcClasseFiltro||ativo)?'1':'0.45';
    card.style.transform=ativo?'translateY(-2px)':'';
    card.style.boxShadow=ativo?'0 4px 16px rgba(44,37,32,0.2)':'';
    card.style.borderWidth=ativo?'6px':'4px';
  });
  var painel=document.getElementById('abc-detalhe-painel');
  if(!painel)return;
  if(!_abcClasseFiltro){painel.style.display='none';return;}

  var lans=getLansPeriodo();
  var todos=[];
  _abcBlocosCache.forEach(function(b){
    b.colabs.forEach(function(c){
      if(c.classe===_abcClasseFiltro)
        todos.push({nome:c.nome,setor:b.setor,prod:c.prod,meta:c.meta,pct:c.pct});
    });
  });
  todos.sort(function(a,b){return b.pct-a.pct;});

  var corClasse=getClasseCor(_abcClasseFiltro);
  var labelClasse=_abcClasseFiltro==='A'?'Classe A — ≥ 80% da meta':
                  _abcClasseFiltro==='B'?'Classe B — 50 a 79% da meta':
                  'Classe C — abaixo de 50% da meta';
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  h+='<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:'+corClasse+';text-transform:uppercase">'+labelClasse+' — '+todos.length+' colaboradores</div>';
  h+='<button onclick="toggleClasseFiltro(null)" style="font-size:10px;font-weight:700;letter-spacing:1px;padding:4px 14px;border:1px solid rgba(44,37,32,0.3);background:transparent;color:#2C2520;cursor:pointer">✕ FECHAR</button>';
  h+='</div>';
  h+='<table class="table"><thead><tr>';
  h+='<th style="width:36px;text-align:center">Pos.</th>';
  h+='<th>Colaborador</th><th>Setor</th>';
  h+='<th style="text-align:center">Produção</th><th style="text-align:center">Meta</th>';
  h+='<th style="text-align:center">%</th><th>Progresso</th>';
  h+='</tr></thead><tbody>';
  todos.forEach(function(r,i){
    var bc=r.pct>=100?'#1a6b3a':r.pct>=70?'#8a6010':'#8B3A0F';
    var pctCap=Math.min(r.pct,100);
    h+='<tr>';
    h+='<td style="text-align:center;font-weight:700;color:'+corClasse+'">'+(i+1)+'</td>';
    h+='<td style="font-weight:700">'+nomeLimpo(r.nome)+'</td>';
    h+='<td style="color:#6B5A4E;font-size:11px">'+r.setor+'</td>';
    h+='<td style="text-align:center;font-weight:700;color:'+corClasse+'">'+r.prod+'</td>';
    h+='<td style="text-align:center;color:#6B5A4E">'+r.meta+'</td>';
    h+='<td style="text-align:center;font-weight:700;color:'+bc+'">'+r.pct+'%</td>';
    h+='<td style="min-width:120px"><div class="bar-wrap"><div class="bar-fill" style="width:'+pctCap+'%;background:'+bc+'"></div></div></td>';
    h+='</tr>';
  });
  h+='</tbody></table>';
  painel.innerHTML=h;
  painel.style.display='block';
  painel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── ANÁLISE INDIVIDUAL ────────────────────────────────────
function normNome(n){return nomeLimpo(n).toLowerCase().trim();}

function buildColabsAgrupados(){
  // Agrupa todas as entradas do COLAB_DATA pelo nome limpo
  var mapa={};
  Object.keys(COLAB_DATA).forEach(function(chave){
    var cd=COLAB_DATA[chave];
    var nl=normNome(chave);
    if(!mapa[nl])mapa[nl]={nomeExibir:nomeLimpo(chave),chaves:[],setores:[]};
    mapa[nl].chaves.push(chave);
    if(cd.setor&&mapa[nl].setores.indexOf(cd.setor)===-1)mapa[nl].setores.push(cd.setor);
  });
  return mapa;
}

    var g=agrupados[nl];
    var setLabel=g.setores.length>0?' ('+g.setores.join(' · ')+')':'';
    html+='<option value="'+nl+'">'+g.nomeExibir+setLabel+'</option>';
  });
  html+='</select>';
  html+='</div></div>';
  html+='<div id="individual-result"></div>';
  document.getElementById('app').innerHTML=html;
}

function filtrarColabSelect(){
  var q=(document.getElementById('busca-colab').value||'').toLowerCase().trim();
  var sel=document.getElementById('select-colab');if(!sel)return;
  var visiveis=[];
  Array.from(sel.options).forEach(function(opt){
    if(!opt.value){opt.style.display='';return;}
    var match=opt.text.toLowerCase().indexOf(q)!==-1;
    opt.style.display=match?'':'none';
    if(match)visiveis.push(opt);
  });
  if(visiveis.length===1){sel.value=visiveis[0].value;selecionarColab(visiveis[0].value);}
  else if(q===''){sel.value='';document.getElementById('individual-result').innerHTML='';}
}

function selecionarColab(nlKey){
  var result=document.getElementById('individual-result');
  if(!nlKey||!result){if(result)result.innerHTML='';return;}

  var agrupados=buildColabsAgrupados();
  var grupo=agrupados[nlKey];
  if(!grupo){result.innerHTML='';return;}

  var lans=getLansPeriodo();
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var mesIni=new Date(hoje.getFullYear(),hoje.getMonth(),1);
  var mesFim=new Date(hoje.getFullYear(),hoje.getMonth()+1,0);mesFim.setHours(23,59,59);

  // Coletar TODOS os lançamentos desse colaborador (por todas as chaves)
  var chaveSet={};grupo.chaves.forEach(function(c){chaveSet[c]=true;});

  var todosLans=ALL_LANCAMENTOS.filter(function(l){return chaveSet[l.nome];});
  var lansPeriodo=lans.filter(function(l){return chaveSet[l.nome];});
  var lansHoje=todosLans.filter(function(l){var dt=parseDate(l.data);return dt&&dt.getTime()===hoje.getTime();});
  var lansMes=todosLans.filter(function(l){var dt=parseDate(l.data);return dt&&dt>=mesIni&&dt<=mesFim;});

  // Totais Hoje
  var hojeProd=lansHoje.reduce(function(s,l){return s+(Number(l.prodCorpo)||0)+(Number(l.prodAlmof)||0);},0);
  // Totais mês atual
  var mesProd=lansMes.reduce(function(s,l){return s+(Number(l.prodCorpo)||0)+(Number(l.prodAlmof)||0);},0);

  // Meta: somar a meta de todas as chaves do colaborador
  var metaDia=grupo.chaves.reduce(function(s,c){var cd=COLAB_DATA[c];return s+(cd&&cd.meta?cd.meta:0);},0);
  var du=diasUteisMes();
  var metaMes=metaDia*du;
  var pctHoje=metaDia>0?Math.round(hojeProd/metaDia*100):null;
  var pctMes=metaMes>0?Math.round(mesProd/metaMes*100):null;

  // Cor principal: setor principal (primeira chave)
  var cdPrincipal=COLAB_DATA[grupo.chaves[0]]||{};
  var corPrincipal=getCor(cdPrincipal.setor||'');

  // ── Cabeçalho do colaborador ─────────────────────────────
  var h='<div style="background:#E8E0D5;border-left:4px solid '+corPrincipal+';padding:16px 20px;margin-bottom:12px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">';
  h+='<div>';
  h+='<div style="font-size:20px;font-weight:700;letter-spacing:2px;color:'+corPrincipal+'">'+grupo.nomeExibir.toUpperCase()+'</div>';
  h+='<div style="font-size:11px;color:#6B5A4E;margin-top:4px;letter-spacing:1px">Setores: '+grupo.setores.join(' · ')+'</div>';
  h+='</div>';

  // KPIs
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  [{label:'Hoje',val:hojeProd,sub:pctHoje!==null?pctHoje+'% da meta':'-',cor:pctHoje===null?corPrincipal:pctHoje>=100?'#1a6b3a':pctHoje>=70?'#8a6010':'#8B3A0F'},
   {label:'Mês Atual',val:mesProd,sub:pctMes!==null?pctMes+'% ('+du+'du)':'-',cor:pctMes===null?corPrincipal:pctMes>=80?'#1a6b3a':pctMes>=50?'#8a6010':'#8B3A0F'},
   {label:'Meta/Dia',val:metaDia||'—',sub:'peças por dia',cor:corPrincipal},
   {label:'Meta Mês',val:metaMes||'—',sub:du+' dias úteis',cor:corPrincipal}
  ].forEach(function(k){
    h+='<div style="background:#DCCCBE;padding:10px 14px;min-width:105px;text-align:center">';
    h+='<div style="font-size:9px;font-weight:700;letter-spacing:2px;color:#6B5A4E;text-transform:uppercase;margin-bottom:4px">'+k.label+'</div>';
    h+='<div style="font-size:24px;font-weight:700;color:'+k.cor+';line-height:1">'+k.val+'</div>';
    h+='<div style="font-size:10px;color:#8a7060;margin-top:3px">'+k.sub+'</div></div>';
  });
  h+='</div></div>';

  if(pctMes!==null){
    var bcM=pctMes>=80?'#1a6b3a':pctMes>=50?'#8a6010':'#8B3A0F';
    h+='<div style="margin-top:12px">';
    h+='<div style="font-size:9px;font-weight:700;letter-spacing:2px;color:#6B5A4E;margin-bottom:4px">PROGRESSO MÊS — '+mesProd+' / '+metaMes+' pcs ('+pctMes+'%)</div>';
    h+='<div class="bar-wrap" style="height:10px"><div class="bar-fill" style="width:'+Math.min(pctMes,100)+'%;background:'+bcM+'"></div></div>';
    h+='</div>';
  }
  h+='</div>';

  // ── Tabela por setor no período selecionado ───────────────
  var porSetor={};
  lansPeriodo.forEach(function(l){
    var s=l.setor||'(sem setor)';
    if(!porSetor[s])porSetor[s]={corpus:0,almof:0,retrab:0,diasSet:{}};
    porSetor[s].corpus+=Number(l.prodCorpo)||0;
    porSetor[s].almof+=Number(l.prodAlmof)||0;
    porSetor[s].retrab+=Number(l.retrabalho)||0;
    var dt=parseDate(l.data);if(dt)porSetor[s].diasSet[dt.toDateString()]=1;
  });

  var setores=Object.keys(porSetor).sort();
  var periodoLabel=getPeriodoLabel();

  if(setores.length===0){
    h+='<div style="background:#DCCCBE;padding:20px;text-align:center;color:#8a7060;font-size:12px;letter-spacing:1px">Nenhum lançamento no período selecionado.</div>';
  } else {
    h+='<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:#6B5A4E;text-transform:uppercase;margin-bottom:8px">Produção por Setor — '+periodoLabel+'</div>';
    h+='<table class="table"><thead><tr>';
    h+='<th>Setor</th>';
    h+='<th style="text-align:center">Corpo</th>';
    h+='<th style="text-align:center">Almofada</th>';
    h+='<th style="text-align:center">Retrabalho</th>';
    h+='<th style="text-align:center">Total</th>';
    h+='<th style="text-align:center">Dias</th>';
    h+='<th style="text-align:center">Meta Período</th>';
    h+='<th style="text-align:center">%</th>';
    h+='<th>Progresso</th>';
    h+='</tr></thead><tbody>';
    var tCorpo=0,tAlmof=0,tRetrab=0,tDias=0,tMeta=0;
    setores.forEach(function(s){
      var sd=porSetor[s];
      var total=sd.corpus+sd.almof;
      var dias=Object.keys(sd.diasSet).length;
      // Meta do setor para esse colaborador nesse período
      var metaChave=grupo.chaves.filter(function(c){return (COLAB_DATA[c]&&COLAB_DATA[c].setor===s);});
      var metaS=metaChave.reduce(function(sum,c){var cd=COLAB_DATA[c];return sum+(cd?getMetaPeriodo(cd.meta):0);},0);
      var pctS=metaS>0?Math.round(total/metaS*100):null;
      var bc=pctS===null?'#6B5A4E':pctS>=100?'#1a6b3a':pctS>=70?'#8a6010':'#8B3A0F';
      var corS=getCor(s);
      tCorpo+=sd.corpus;tAlmof+=sd.almof;tRetrab+=sd.retrab;tDias+=dias;tMeta+=metaS;
      h+='<tr>';
      h+='<td style="font-weight:700;color:'+corS+'">'+s+'</td>';
      h+='<td style="text-align:center;font-weight:700">'+(sd.corpus>0?sd.corpus:'-')+'</td>';
      h+='<td style="text-align:center;font-weight:700;color:#1a5f8a">'+(sd.almof>0?sd.almof:'-')+'</td>';
      h+='<td style="text-align:center;font-weight:700;color:#7030A0">'+(sd.retrab>0?sd.retrab:'-')+'</td>';
      h+='<td style="text-align:center;font-weight:700;color:'+corS+'">'+total+'</td>';
      h+='<td style="text-align:center;color:#6B5A4E">'+dias+'d</td>';
      h+='<td style="text-align:center;color:#6B5A4E">'+(metaS>0?metaS:'-')+'</td>';
      h+='<td style="text-align:center;font-weight:700;color:'+bc+'">'+(pctS!==null?pctS+'%':'-')+'</td>';
      h+='<td>'+(pctS!==null?'<div class="bar-wrap"><div class="bar-fill" style="width:'+Math.min(pctS,100)+'%;background:'+bc+'"></div></div>':'-')+'</td>';
      h+='</tr>';
    });
    // Totais
    var tTotal=tCorpo+tAlmof;
    var pctT=tMeta>0?Math.round(tTotal/tMeta*100):null;
    var bcT=pctT===null?'#DCCCBE':pctT>=100?'#1a6b3a':pctT>=50?'#8a6010':'#8B3A0F';
    h+='<tr>';
    h+='<td style="background:#2C2520;color:#DCCCBE;font-weight:700;letter-spacing:1px">TOTAL</td>';
    h+='<td style="background:#2C2520;color:#DCCCBE;text-align:center;font-weight:700">'+tCorpo+'</td>';
    h+='<td style="background:#2C2520;color:#DCCCBE;text-align:center;font-weight:700">'+tAlmof+'</td>';
    h+='<td style="background:#2C2520;color:#DCCCBE;text-align:center;font-weight:700">'+tRetrab+'</td>';
    h+='<td style="background:#1a5f8a;color:#fff;text-align:center;font-weight:700">'+tTotal+'</td>';
    h+='<td style="background:#2C2520;color:#DCCCBE;text-align:center">'+tDias+'d</td>';
    h+='<td style="background:#2C2520;color:#DCCCBE;text-align:center">'+(tMeta>0?tMeta:'-')+'</td>';
    h+='<td style="background:#2C2520;text-align:center;font-weight:700;color:'+bcT+'">'+(pctT!==null?pctT+'%':'-')+'</td>';
    h+='<td style="background:#2C2520">'+(pctT!==null?'<div class="bar-wrap" style="background:rgba(220,204,190,0.15)"><div class="bar-fill" style="width:'+Math.min(pctT,100)+'%;background:'+bcT+'"></div></div>':'-')+'</td>';
    h+='</tr>';
    h+='</tbody></table>';
  }

  result.innerHTML=h;
}

async function carregarDados(){
  document.getElementById('app').innerHTML='<div class="loading-msg"><div class="spinner"></div>Carregando dados...</div>';
  try{
    var r0=await fetch(COLAB_URL+'&t='+Date.now());if(r0.ok)COLAB_DATA=parseColab(await r0.text());
    var r2=await fetch(LANCAMENTOS_URL+'&t='+Date.now());if(!r2.ok)throw new Error('HTTP '+r2.status);
    var txt=await r2.text();
    var linhas=txt.split('\n').filter(function(l){return l.trim();});
    ALL_LANCAMENTOS=[];
    for(var i=3;i<linhas.length;i++){
      var cc=parseCSVLine(linhas[i]);if(!cc[0]||!cc[1])continue;
      ALL_LANCAMENTOS.push({data:cc[0],nome:cc[1],setor:cc[2],sub:cc[3]||'',tv:cc[4]||'',prodCorpo:cc[5],prodAlmof:cc[6],retrabalho:cc[7]});
    }
    render();
  }catch(e){
    document.getElementById('app').innerHTML='<div class="loading-msg" style="color:#8B3A0F">Erro: '+e.message+'</div>';
    console.error(e);
  }
}
carregarDados();

</script>
