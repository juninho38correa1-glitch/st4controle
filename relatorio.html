<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Relatorio de Producao — Studyo4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:Arial,sans-serif;background:#F5F0EA;color:#2C2520}
.page{max-width:1100px;margin:0 auto;padding:20px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:2px solid #2C2520;margin-bottom:16px}
.logo{font-size:14px;font-weight:700;letter-spacing:3px;color:#2C2520}
.logo span{font-weight:400;letter-spacing:2px;color:#6B5A4E}
.back-btn{font-size:11px;font-weight:700;letter-spacing:2px;padding:6px 16px;border:1px solid rgba(44,37,32,0.3);background:transparent;color:#2C2520;cursor:pointer;text-decoration:none;text-transform:uppercase}
.back-btn:hover{background:#2C2520;color:#DCCCBE}
.nav-abas{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid rgba(44,37,32,0.2)}
.abtn{font-size:12px;font-weight:700;letter-spacing:2px;padding:10px 28px;border:none;background:transparent;color:#8a7060;cursor:pointer;text-transform:uppercase;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.abtn.active{color:#2C2520;border-bottom-color:#2C2520}
.abtn:hover{color:#2C2520}
.controls-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.report-title{font-size:20px;font-weight:700;color:#2C2520}
.report-sub{font-size:11px;color:#6B5A4E;margin-top:3px;letter-spacing:1px}
.period-btns{display:flex;gap:8px}
.pbtn{font-size:11px;font-weight:700;letter-spacing:1px;padding:7px 18px;border:1px solid rgba(44,37,32,0.3);background:transparent;color:#2C2520;cursor:pointer;text-transform:uppercase;transition:all .2s}
.pbtn.active,.pbtn:hover{background:#2C2520;color:#DCCCBE;border-color:#2C2520}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.sum-card{background:#DCCCBE;padding:14px 16px;border-left:4px solid}
.sum-label{font-size:9px;font-weight:700;letter-spacing:2px;color:#6B5A4E;text-transform:uppercase;margin-bottom:4px}
.sum-val{font-size:28px;font-weight:700;line-height:1}
.sum-sub{font-size:10px;color:#6B5A4E;margin-top:3px}
.setor-block{margin-bottom:24px}
.setor-title{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:8px 14px;margin-bottom:1px}
.table{width:100%;border-collapse:collapse}
.table th{background:#2C2520;color:#DCCCBE;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 12px;text-align:left}
.table td{padding:9px 12px;font-size:12px;border-bottom:1px solid rgba(44,37,32,0.08);background:#E8E0D5}
.table tr:nth-child(even) td{background:#DCCCBE}
.table tr:hover td{background:#d4c4b0}
.bar-wrap{width:100%;height:8px;background:rgba(44,37,32,0.1);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap}
.badge-ok{background:rgba(26,107,58,0.15);color:#1a6b3a;border:1px solid rgba(26,107,58,0.3)}
.badge-no{background:rgba(139,58,15,0.1);color:#8B3A0F;border:1px solid rgba(139,58,15,0.2)}
.badge-zer{background:rgba(44,37,32,0.08);color:#8a7060;border:1px solid rgba(44,37,32,0.15)}
.loading-msg{text-align:center;padding:60px;font-size:13px;letter-spacing:2px;color:#6B5A4E;text-transform:uppercase}
.spinner{width:36px;height:36px;border:2px solid rgba(44,37,32,0.15);border-top-color:#8B3A0F;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.print-btn{font-size:11px;font-weight:700;letter-spacing:2px;padding:7px 18px;border:1px solid #1a6b3a;background:transparent;color:#1a6b3a;cursor:pointer;text-transform:uppercase;transition:all .2s}
.print-btn:hover{background:#1a6b3a;color:#fff}
.footer{text-align:center;padding:20px 0;font-size:10px;color:#8a7060;border-top:1px solid rgba(44,37,32,0.15);margin-top:24px}
@media print{
  .no-print{display:none!important}
  body{background:#fff}
  .page{padding:10px}
  .sum-card,.table th,.setor-title{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div>
      <div class="logo">STUDYO4 <span>ESTOFADOS</span></div>
      <div style="font-size:10px;color:#6B5A4E;margin-top:3px;letter-spacing:1px">RELATORIO DE PRODUCAO</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="print-btn no-print" onclick="window.print()">Exportar PDF</button>
      <a href="index.html" class="back-btn no-print">&larr; Voltar</a>
    </div>
  </div>

  <div class="nav-abas no-print">
    <button class="abtn active" id="abtn-relatorio" onclick="setAba('relatorio')">Relatório</button>
    <button class="abtn" id="abtn-graficos" onclick="setAba('graficos')">Gráficos</button>
  </div>

  <div class="controls-row">
    <div>
      <div class="report-title" id="report-title">RELATÓRIO DO DIA</div>
      <div class="report-sub" id="report-sub">Carregando...</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="period-btns" id="periodo-row">
        <button class="pbtn active" onclick="setPeriodo('dia')">Hoje</button>
        <button class="pbtn" onclick="setPeriodo('semana')">Semana</button>
        <button class="pbtn" onclick="setPeriodo('mes')">Mês</button>
      </div>

  </div>

  <div id="app"><div class="loading-msg"><div class="spinner"></div>Carregando dados...</div></div>
  <div class="footer">&copy; Junior Corr&ecirc;a &middot; Todos os direitos reservados &middot; STUDYO4 Estofados</div>
</div>
<script>


var LANCAMENTOS_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSu6isVwVIjZKgzu5SvgBip8Xu7kHPelQJqz96JgN9gDXcNIn09xWdhkGeipQ0RwDDDhxZkU2sEP0bp/pub?gid=1405226140&single=true&output=csv';
var CONFIG_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSu6isVwVIjZKgzu5SvgBip8Xu7kHPelQJqz96JgN9gDXcNIn09xWdhkGeipQ0RwDDDhxZkU2sEP0bp/pub?gid=626803240&single=true&output=csv';
var COLAB_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSu6isVwVIjZKgzu5SvgBip8Xu7kHPelQJqz96JgN9gDXcNIn09xWdhkGeipQ0RwDDDhxZkU2sEP0bp/pub?gid=1534833771&single=true&output=csv';
var INTERVALO_MIN=5;
var METAS={};
var COLAB_DATA={};
function pad(n){return String(n).padStart(2,'0');}
function nomeCurto(nome,max){
  max=max||16;if(!nome)return '';
  var p=nome.trim().split(' ');var r=p[0];
  for(var i=1;i<p.length;i++){var t=r+' '+p[i];if(t.length<=max)r=t;else{r=r+'...';break;}}
  return r;
}
function tickClock(){
  var n=new Date();
  var _clk=document.getElementById('clk');if(_clk)_clk.textContent=pad(n.getHours())+':'+pad(n.getMinutes());
  var ds=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
  var ms=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var _dt=document.getElementById('dt');if(_dt)_dt.textContent=ds[n.getDay()]+', '+n.getDate()+' de '+ms[n.getMonth()]+' de '+n.getFullYear();
  var _upd=document.getElementById('upd');if(_upd)_upd.textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  var mel=document.getElementById('mes-atual');if(mel)mel.textContent='Acumulado: '+ms[n.getMonth()]+' '+n.getFullYear();
}
var countdown=INTERVALO_MIN*60;
function tickCountdown(){
  countdown--;
  if(countdown<=0){countdown=INTERVALO_MIN*60;carregarDados();}
  document.getElementById('ctd').textContent=pad(Math.floor(countdown/60))+':'+pad(countdown%60);
}
tickClock();setInterval(tickClock,1000);
function set(id,val){var e=document.getElementById(id);if(e)e.textContent=val;}
function setBar(id,val,max){var e=document.getElementById(id);if(e)e.style.width=(max>0?Math.min(100,Math.round(val/max*100)):0)+'%';}
function parseCSVLine(line){
  var r=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;}
    else if(line[i]===','&&!inQ){r.push(cur.trim().replace(/^"|"$/g,''));cur='';}
    else if(line[i]!=='"'){cur+=line[i];}
  }
  r.push(cur.trim().replace(/^"|"$/g,''));return r;
}
function parseDate(str){
  if(!str)return null;str=str.trim();
  var parts,d,m,y,sl=str.indexOf('/'),da=str.indexOf('-');
  if(sl!==-1){parts=str.split('/');if(parts[2]&&parts[2].length===4){d=+parts[0];m=+parts[1];y=+parts[2];}else{m=+parts[0];d=+parts[1];y=+parts[2];}}
  else if(da!==-1){parts=str.split('-');y=+parts[0];m=+parts[1];d=+parts[2];}
  else return null;
  if(!y||!m||!d)return null;return new Date(y,m-1,d);
}
function parseColab(csv){
  var linhas=csv.split('\n').filter(function(l){return l.trim();});
  var map={};
  for(var i=2;i<linhas.length;i++){
    var c=parseCSVLine(linhas[i]);
    if(!c[0])continue;
    map[c[0].trim()]={setor:c[1]?c[1].trim():'',sub:c[2]?c[2].trim():'',meta:Number(c[3])||0};
  }
  return map;
}
function parseConfig(csv){
  var linhas=csv.split('\n').filter(function(l){return l.trim();});
  var map={};
  for(var i=2;i<linhas.length;i++){
    var c=parseCSVLine(linhas[i]);
    if(c[0]&&c[1])map[c[0].trim()]=Number(c[1])||0;
  }
  return map;
}
function getMetaPessoa(nome){
  var d=COLAB_DATA[nome];
  return d?d.meta:0;
}
function buildMetaRanking(cid,rows,color){
  var el=document.getElementById(cid);if(!el)return;
  var sorted=rows.slice().sort(function(a,b){return b.dia-a.dia;});
  var medals=['g','s','b'];var prev=-1,pos=0;
  var html=sorted.map(function(r,i){
    if(r.dia!==prev){pos=i+1;prev=r.dia;}
    var medal=pos<=3?medals[pos-1]:'';
    var meta=getMetaPessoa(r.nome);
    var pct=meta>0?Math.round(r.dia/meta*100):0;
    var pctCap=Math.min(pct,100);
    var metaPosX=meta>0?Math.min(100,Math.round(meta/Math.max(meta,r.dia)*100)):100;
    var barColor=meta>0?(pct>=100?'#00B050':pct>=70?'#EF9F27':'#FF0066'):color;
    var badgeHtml=meta>0?('<div class="meta-badge '+(pct>=100?'badge-ok':'badge-no')+'">'+(pct>=100?'META ⭐':pct+'%')+'</div>'):'';
    var nomeExib=nomeCurto(r.nome,16);
    return '<div class="meta-row"><div class="mpos '+medal+'">'+String(pos).padStart(2,'0')+'</div><div class="mname"><div>'+nomeExib+'</div><div style="font-size:10px;font-weight:400;color:#6B5A4E;margin-top:1px">ac: '+r.ac+(meta>0?' · meta:'+meta:'')+'</div></div><div class="mbar-wrap"><div class="mbar-bg"><div class="mbar-f" style="width:'+pctCap+'%;background:'+barColor+'"></div>'+(meta>0?'<div class="mbar-meta" style="left:'+metaPosX+'%"></div>':'')+'</div></div><div class="mpct" style="color:'+barColor+'">'+(meta>0?pct+'%':'')+'</div><div class="mqty" style="color:'+color+'">'+r.dia+'</div>'+badgeHtml+'</div>';
  }).join('');
  var total=rows.reduce(function(s,r){return s+r.dia;},0);
  var totalAc=rows.reduce(function(s,r){return s+r.ac;},0);
  html+='<div class="meta-row"><div class="mpos"></div><div class="mname" style="color:#6B5A4E;font-size:11px">TOTAL</div><div class="mbar-wrap"></div><div class="mpct"></div><div class="mqty" style="color:#6B5A4E;font-size:12px">'+total+'</div><div class="meta-badge" style="font-size:9px;color:#6B5A4E">ac:'+totalAc+'</div></div>';
  el.innerHTML=html;
}
function buildPizza(canvasId,rows,color){
  var canvas=document.getElementById(canvasId);if(!canvas||!rows.length)return;
  var ctx=canvas.getContext('2d');
  var W=canvas.offsetWidth||300;var H=canvas.offsetHeight||220;
  canvas.width=W;canvas.height=H;ctx.clearRect(0,0,W,H);
  var sorted=rows.slice().sort(function(a,b){return b.dia-a.dia;});
  var hasData=sorted.some(function(r){return r.dia>0;});
  var total=sorted.reduce(function(s,r){return s+r.dia;},0);
  var palette=['#8B3A0F','#1a5f8a','#1a6b3a','#8a6010','#7030A0','#5B3A8B','#1a7a6a','#8B5A2B'];
  var legW=115;
  var pieAreaW=W-legW-8;
  var pieR=Math.min(pieAreaW/2,H/2)-8;
  var cx=legW+8+pieAreaW/2;
  var cy=H/2;
  if(hasData){
    var angle=-Math.PI/2;
    sorted.forEach(function(row,i){
      if(row.dia===0)return;
      var slice=2*Math.PI*(row.dia/total);
      ctx.beginPath();ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,pieR,angle,angle+slice);
      ctx.closePath();
      ctx.fillStyle=palette[i%palette.length];ctx.fill();
      ctx.strokeStyle='rgba(245,240,234,0.9)';ctx.lineWidth=2;ctx.stroke();
      if(slice>0.15){
        ctx.fillStyle='#fff';ctx.font='bold 13px Arial';ctx.textAlign='center';
        ctx.fillText(row.dia,cx+Math.cos(angle+slice/2)*pieR*0.65,cy+Math.sin(angle+slice/2)*pieR*0.65+5);
      }
      angle+=slice;
    });
  }else{
    ctx.beginPath();ctx.arc(cx,cy,pieR,0,2*Math.PI);
    ctx.fillStyle='rgba(44,37,32,0.08)';ctx.fill();
    ctx.fillStyle='#8a7060';ctx.font='11px Arial';ctx.textAlign='center';
    ctx.fillText('sem dados hoje',cx,cy+4);
  }
  var legX=4;
  var legY=cy-(sorted.length*22)/2;
  if(legY<8)legY=8;
  sorted.forEach(function(row,i){
    ctx.beginPath();ctx.arc(legX+6,legY+6,6,0,2*Math.PI);
    ctx.fillStyle=palette[i%palette.length];ctx.fill();
    ctx.fillStyle='#2C2520';ctx.font='11px Arial';ctx.textAlign='left';
    var nome=row.nome.length>13?row.nome.slice(0,13)+'...':row.nome;
    ctx.fillText(nome+' ('+row.dia+')',legX+16,legY+10);
    legY+=22;
  });
}
function buildMetaTotal(cid,totalDia,meta,color){
  var el=document.getElementById(cid);if(!el)return;
  var pct=meta>0?Math.min(Math.round(totalDia/meta*100),150):0;
  var barColor=pct>=100?'#00B050':pct>=70?'#EF9F27':'#FF0066';
  var metaPos=meta>0?Math.min(100,Math.round(meta/Math.max(meta,totalDia)*100)):100;
  el.innerHTML='<div class="mtb-label">PROGRESSO GERAL — '+totalDia+' / '+meta+' pecas ('+pct+'%)</div><div class="mtb-wrap"><div class="mtb-fill" style="width:'+Math.min(pct,100)+'%;background:'+barColor+'"></div><div class="mtb-line" style="left:'+metaPos+'%"></div><div class="mtb-pct">'+pct+'%</div></div>';
}

function buildMetaMes(cid,totalAc,metaMes){
  var el=document.getElementById(cid);if(!el)return;
  var pct=metaMes>0?Math.min(Math.round(totalAc/metaMes*100),150):0;
  var barColor=pct>=100?'#00B050':pct>=70?'#EF9F27':'#FF0066';
  var metaPos=metaMes>0?Math.min(100,Math.round(metaMes/Math.max(metaMes,totalAc)*100)):100;
  el.innerHTML='<div class="mtb-label">META DO MES — '+totalAc+' / '+metaMes+' pecas ('+pct+'%)</div><div class="mtb-wrap"><div class="mtb-fill" style="width:'+Math.min(pct,100)+'%;background:'+barColor+'"></div><div class="mtb-line" style="left:'+metaPos+'%"></div><div class="mtb-pct">'+pct+'%</div></div>';
}

function buildMetaCol(cid,totalDia,meta,color){
  var el=document.getElementById(cid);if(!el)return;
  var pct=meta>0?Math.min(Math.round(totalDia/meta*100),150):0;
  var barColor=pct>=100?'#00B050':pct>=70?'#EF9F27':'#FF0066';
  var metaPos=meta>0?Math.min(100,Math.round(meta/Math.max(meta,totalDia)*100)):100;
  el.innerHTML='<div style="font-size:11px;color:#6B5A4E;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-weight:600">Meta dia: '+totalDia+' / '+meta+' ('+pct+'%)</div><div style="position:relative;height:8px;background:rgba(44,37,32,0.1);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+Math.min(pct,100)+'%;background:'+barColor+';border-radius:4px;transition:width .8s ease"></div><div style="position:absolute;top:0;height:100%;width:2px;background:rgba(255,255,255,0.4);left:'+metaPos+'%"></div></div>';
}

function diasUteisMes(){
  var hoje=new Date();
  var ano=hoje.getFullYear(),mes=hoje.getMonth();
  var diasNoMes=new Date(ano,mes+1,0).getDate();
  var uteis=0;
  for(var d=1;d<=diasNoMes;d++){
    var dow=new Date(ano,mes,d).getDay();
    if(dow!==0&&dow!==6)uteis++;
  }
  return uteis;
}
function calcMetaMes(setorFiltro){
  var uteis=diasUteisMes();
  var vistos={};
  var total=0;
  Object.keys(COLAB_DATA).forEach(function(nome){
    var cd=COLAB_DATA[nome];
    if(cd&&cd.setor===setorFiltro&&cd.meta>0&&!vistos[nome]){
      vistos[nome]=true;
      total+=cd.meta;
    }
  });
  return total*uteis;
}
function calcMetaMesSubs(subList){
  var uteis=diasUteisMes();
  var vistos={};
  var total=0;
  Object.keys(COLAB_DATA).forEach(function(nome){
    var cd=COLAB_DATA[nome];
    if(cd&&subList.indexOf(cd.sub)!==-1&&cd.meta>0&&!vistos[nome]){
      vistos[nome]=true;
      total+=cd.meta;
    }
  });
  return total*uteis;
}

function calcMetaDiaPessoas(rows){
  return rows.reduce(function(s,r){return s+(getMetaPessoa(r.nome)||35);},0);
}

function buildMetaColMes(cid,totalAc,metaMes){
  var el=document.getElementById(cid);if(!el)return;
  var pct=metaMes>0?Math.min(Math.round(totalAc/metaMes*100),150):0;
  var barColor=pct>=100?'#1a6b3a':pct>=70?'#8a6010':'#8B3A0F';
  var metaPos=metaMes>0?Math.min(100,Math.round(metaMes/Math.max(metaMes,totalAc)*100)):100;
  el.innerHTML='<div style="font-size:9px;color:#6B5A4E;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;font-weight:600">Meta Mês: '+totalAc+' / '+metaMes+' ('+pct+'%)</div><div style="position:relative;height:6px;background:rgba(44,37,32,0.1);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+Math.min(pct,100)+'%;background:'+barColor+';border-radius:3px;transition:width .8s ease"></div><div style="position:absolute;top:0;height:100%;width:2px;background:rgba(44,37,32,0.3);left:'+metaPos+'%"></div></div>';
}

function calcMetaDiaSetor(setorFiltro){
  var total=0;
  Object.keys(COLAB_DATA).forEach(function(nome){
    var cd=COLAB_DATA[nome];
    if(cd&&cd.setor===setorFiltro&&cd.meta>0)total+=cd.meta;
  });
  return total;
}
function calcMetaDiaSubs(subList){
  var total=0;
  Object.keys(COLAB_DATA).forEach(function(nome){
    var cd=COLAB_DATA[nome];
    if(cd&&subList.indexOf(cd.sub)!==-1&&cd.meta>0)total+=cd.meta;
  });
  return total;
}
async function carregarDados(){
  try{
    var r0=await fetch(COLAB_URL);
    if(r0.ok){var csv0=await r0.text();COLAB_DATA=parseColab(csv0);}
    var r1=await fetch(CONFIG_URL);
    if(r1.ok){var csv1=await r1.text();METAS=parseConfig(csv1);}
    var r2=await fetch(LANCAMENTOS_URL);
    if(!r2.ok)throw new Error('HTTP '+r2.status);
    var txt=await r2.text();
    processar(txt);
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('erro').style.display='none';
  }catch(e){
    document.getElementById('loading').style.display='none';
    var er=document.getElementById('erro');
    er.style.display='block';
    er.style.position='fixed';
    er.style.top='60px';
    er.style.left='10px';
    er.style.right='10px';
    er.style.zIndex='9999';
    er.style.padding='20px';
    er.style.fontSize='14px';
    er.innerHTML='<strong style="color:#c00">ERRO AO CARREGAR</strong><br><br>'+e.message+'<br><br><small>Verifique o console (F12)</small>';
    console.error('carregarDados error:',e);
  }
}



var PERIODO='dia';
var ABA='relatorio';
var ALL_LANCAMENTOS=[];

var SETORES=[
  {nome:'Costura',cor:'#8B3A0F',subs:['Costura'],tipo:'setor',duplo:true},
  {nome:'Corte',cor:'#1a6b3a',subs:['Corte'],tipo:'setor',duplo:false},
  {nome:'Marcenaria / CNC / Laminacao Madeira',cor:'#1a5f8a',subs:['Marcenaria','CNC','Laminacao Madeira','Marceneiro'],tipo:'sub',duplo:false},
  {nome:'Espumacao / Laminacao Espuma',cor:'#8a6010',subs:['Espumacao','Laminacao Espuma'],tipo:'sub',duplo:false},
  {nome:'Montagem Estrutural / Preparacao',cor:'#7030A0',subs:['Montagem Estrutural','Preparacao'],tipo:'sub',duplo:false},
  {nome:'Tapecaria',cor:'#1a6b3a',subs:['Tapecaria'],tipo:'setor',duplo:false},
  {nome:'Montagem Final',cor:'#1a5f8a',subs:['Montagem Final'],tipo:'setor',duplo:false},
  {nome:'Embalagem',cor:'#8a6010',subs:['Embalagem'],tipo:'setor',duplo:false}
];

function setAba(a){
  ABA=a;
  document.querySelectorAll('.abtn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('abtn-'+a).classList.add('active');
  document.getElementById('periodo-row').style.display=a==='relatorio'?'flex':'none';
  render();
}

function setPeriodo(p){
  PERIODO=p;
  document.querySelectorAll('.pbtn').forEach(function(b){b.classList.remove('active');});
  event.target.classList.add('active');
  render();
}

function render(){
  if(ABA==='relatorio')renderRelatorio();
  else renderGraficos();
}

function getPeriodoDatas(){
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var ini,fim=new Date(hoje);fim.setHours(23,59,59);
  if(PERIODO==='dia'){ini=new Date(hoje);}
  else if(PERIODO==='semana'){ini=new Date(hoje);var dow=ini.getDay();ini.setDate(ini.getDate()-(dow===0?6:dow-1));}
  else{ini=new Date(hoje.getFullYear(),hoje.getMonth(),1);}
  return{ini:ini,fim:fim};
}

function getPeriodoLabel(){
  var meses=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var hoje=new Date();
  if(PERIODO==='dia')return 'Producao de hoje \u2014 '+hoje.getDate()+' de '+meses[hoje.getMonth()]+' de '+hoje.getFullYear();
  if(PERIODO==='semana')return 'Producao desta semana';
  return 'Producao de '+meses[hoje.getMonth()]+' '+hoje.getFullYear();
}

function colaboradorNoSetor(cd,setor){
  if(!cd||cd.meta<=0)return false;
  var match=false;
  if(setor.tipo==='setor'){setor.subs.forEach(function(s){if(cd.setor===s)match=true;});}
  else{setor.subs.forEach(function(s){if(cd.sub===s)match=true;});}
  return match;
}

function getMetaPeriodo(meta){
  if(PERIODO==='dia')return meta;
  if(PERIODO==='semana'){var dow=new Date().getDay();return meta*(dow===0?7:(dow===6?6:dow));}
  return meta*diasUteisMes();
}

function getLansPeriodo(){
  var d=getPeriodoDatas();
  return ALL_LANCAMENTOS.filter(function(l){
    var dt=parseDate(l.data);return dt&&dt>=d.ini&&dt<=d.fim;
  });
}

function calcSetorData(setor,lans){
  var colabs=[];
  Object.keys(COLAB_DATA).forEach(function(nome){
    var cd=COLAB_DATA[nome];
    if(colaboradorNoSetor(cd,setor))colabs.push({nome:nome,meta:cd.meta,sub:cd.sub});
  });
  var mapCorpo={};var mapAlmof={};var mapTotal={};
  lans.forEach(function(l){
    var cd=COLAB_DATA[l.nome];
    if(!cd||!colaboradorNoSetor(cd,setor))return;
    if(!mapCorpo[l.nome]){mapCorpo[l.nome]=0;mapAlmof[l.nome]=0;mapTotal[l.nome]=0;}
    var vC=Number(l.prodCorpo)||0;var vA=Number(l.prodAlmof)||0;
    mapCorpo[l.nome]+=vC;mapAlmof[l.nome]+=vA;
    mapTotal[l.nome]+=setor.duplo?(vC+vA):vC;
  });
  return{colabs:colabs,mapCorpo:mapCorpo,mapAlmof:mapAlmof,mapTotal:mapTotal};
}

// ── GRÁFICOS ──────────────────────────────────────────────
function renderGraficos(){
  document.getElementById('report-sub').textContent=getPeriodoLabel();
  var lans=getLansPeriodo();

  // Montar lista global de colaboradores com producao
  var todosColabs=[];
  SETORES.forEach(function(setor){
    var d=calcSetorData(setor,lans);
    d.colabs.forEach(function(c){
      todosColabs.push({
        nome:c.nome,setor:setor.nome,cor:setor.cor,
        prod:d.mapTotal[c.nome]||0,meta:getMetaPeriodo(c.meta)
      });
    });
  });
  todosColabs.sort(function(a,b){return b.prod-a.prod;});

  // Calcular classes ABC
  var totalProd=todosColabs.reduce(function(s,c){return s+c.prod;},0);
  var acum=0;
  todosColabs.forEach(function(c){
    acum+=c.prod;
    c.pctAcum=totalProd>0?Math.round(acum/totalProd*100):0;
    c.classe=c.pctAcum<=80?'A':c.pctAcum<=95?'B':'C';
    c.pctMeta=c.meta>0?Math.round(c.prod/c.meta*100):0;
  });

  // Evolução diária do mês
  var hoje=new Date();
  var diasMes=[];
  var iniMes=new Date(hoje.getFullYear(),hoje.getMonth(),1);
  for(var d=new Date(iniMes);d<=hoje;d.setDate(d.getDate()+1)){
    if(d.getDay()>0&&d.getDay()<6)diasMes.push(new Date(d));
  }
  var prodPorDia={};
  diasMes.forEach(function(d){prodPorDia[d.toDateString()]=0;});
  ALL_LANCAMENTOS.forEach(function(l){
    var dt=parseDate(l.data);if(!dt)return;
    var key=dt.toDateString();
    if(prodPorDia[key]===undefined)return;
    var cd=COLAB_DATA[l.nome];if(!cd||cd.meta<=0)return;
    var isCostura=cd.setor==='Costura';
    prodPorDia[key]+=(isCostura?((Number(l.prodCorpo)||0)+(Number(l.prodAlmof)||0)):(Number(l.prodCorpo)||0));
  });

  var html='<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">';

  // Card info ABC
  var nA=todosColabs.filter(function(c){return c.classe==='A';}).length;
  var nB=todosColabs.filter(function(c){return c.classe==='B';}).length;
  var nC=todosColabs.filter(function(c){return c.classe==='C';}).length;
  html+='<div style="background:#DCCCBE;padding:14px 16px;border-left:4px solid #8B3A0F">';
  html+='<div style="font-size:9px;font-weight:700;letter-spacing:2px;color:#6B5A4E;text-transform:uppercase;margin-bottom:10px">Classificacao ABC</div>';
  html+='<div style="display:flex;gap:12px">';
  html+='<div style="text-align:center;flex:1;background:#fff;padding:10px;border-radius:4px"><div style="font-size:22px;font-weight:700;color:#1a6b3a">'+nA+'</div><div style="font-size:9px;font-weight:700;letter-spacing:1px;color:#1a6b3a">CLASSE A</div><div style="font-size:10px;color:#6B5A4E">80% da prod.</div></div>';
  html+='<div style="text-align:center;flex:1;background:#fff;padding:10px;border-radius:4px"><div style="font-size:22px;font-weight:700;color:#8a6010">'+nB+'</div><div style="font-size:9px;font-weight:700;letter-spacing:1px;color:#8a6010">CLASSE B</div><div style="font-size:10px;color:#6B5A4E">15% da prod.</div></div>';
  html+='<div style="text-align:center;flex:1;background:#fff;padding:10px;border-radius:4px"><div style="font-size:22px;font-weight:700;color:#8B3A0F">'+nC+'</div><div style="font-size:9px;font-weight:700;letter-spacing:1px;color:#8B3A0F">CLASSE C</div><div style="font-size:10px;color:#6B5A4E">5% da prod.</div></div>';
  html+='</div></div>';

  // Card info evolucao
  var mediaDia=diasMes.length>0?Math.round(Object.values(prodPorDia).reduce(function(s,v){return s+v;},0)/diasMes.length):0;
  html+='<div style="background:#DCCCBE;padding:14px 16px;border-left:4px solid #1a5f8a">';
  html+='<div style="font-size:9px;font-weight:700;letter-spacing:2px;color:#6B5A4E;text-transform:uppercase;margin-bottom:6px">Media Diaria do Mes</div>';
  html+='<div style="font-size:36px;font-weight:700;color:#1a5f8a;line-height:1">'+mediaDia+'</div>';
  html+='<div style="font-size:10px;color:#6B5A4E;margin-top:4px">pecas por dia util</div></div>';
  html+='</div>';

  // Grafico 1: Curva ABC
  html+='<div style="background:#DCCCBE;padding:16px;margin-bottom:20px">';
  html+='<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:#2C2520;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #2C2520">// Curva ABC — Producao por Colaborador</div>';
  html+='<canvas id="chart-abc" style="width:100%;height:280px"></canvas></div>';

  // Grafico 2: Evolucao diaria
  html+='<div style="background:#DCCCBE;padding:16px;margin-bottom:20px">';
  html+='<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:#2C2520;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #2C2520">// Evolucao Diaria — '+new Date().toLocaleString("pt-BR",{month:"long",year:"numeric"}).toUpperCase()+'</div>';
  html+='<canvas id="chart-evolucao" style="width:100%;height:220px"></canvas></div>';

  // Grafico 3: Meta vs Realizado por setor
  html+='<div style="background:#DCCCBE;padding:16px;margin-bottom:20px">';
  html+='<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:#2C2520;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #2C2520">// Meta vs Realizado por Setor</div>';
  html+='<canvas id="chart-setores" style="width:100%;height:220px"></canvas></div>';

  document.getElementById('app').innerHTML=html;

  // Desenhar gráficos após render
  setTimeout(function(){
    drawABC(todosColabs);
    drawEvolucao(diasMes,prodPorDia);
    drawSetores(lans);
  },50);
}

function drawABC(colabs){
  var canvas=document.getElementById('chart-abc');if(!canvas)return;
  var W=canvas.offsetWidth;var H=280;
  canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(colabs.length===0)return;

  var margin={left:40,right:60,top:20,bottom:60};
  var chartW=W-margin.left-margin.right;
  var chartH=H-margin.top-margin.bottom;
  var n=colabs.length;
  var barW=Math.max(8,Math.floor(chartW/n)-2);
  var maxProd=colabs[0]?colabs[0].prod:1;

  // Grade
  ctx.strokeStyle='rgba(44,37,32,0.1)';ctx.lineWidth=1;
  [0,25,50,75,100].forEach(function(pct){
    var y=margin.top+chartH-(chartH*pct/100);
    ctx.beginPath();ctx.moveTo(margin.left,y);ctx.lineTo(margin.left+chartW,y);ctx.stroke();
    ctx.fillStyle='#6B5A4E';ctx.font='9px Arial';ctx.textAlign='right';
    ctx.fillText(pct+'%',margin.left-4,y+3);
  });

  // Barras
  colabs.forEach(function(c,i){
    var x=margin.left+i*(barW+2);
    var barH=maxProd>0?Math.round((c.prod/maxProd)*chartH):0;
    var y=margin.top+chartH-barH;
    var col=c.classe==='A'?'#1a6b3a':c.classe==='B'?'#8a6010':'#8B3A0F';
    ctx.fillStyle=col;
    ctx.fillRect(x,y,barW,barH);
    if(c.prod>0){
      ctx.fillStyle='#2C2520';ctx.font='bold 9px Arial';ctx.textAlign='center';
      ctx.fillText(c.prod,x+barW/2,y-3);
    }
    // Nome rotacionado
    ctx.save();
    ctx.translate(x+barW/2,margin.top+chartH+8);
    ctx.rotate(-Math.PI/4);
    ctx.fillStyle='#6B5A4E';ctx.font='9px Arial';ctx.textAlign='right';
    ctx.fillText(nomeCurto(c.nome,12),0,0);
    ctx.restore();
  });

  // Linha acumulada
  ctx.strokeStyle='#1a5f8a';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();
  colabs.forEach(function(c,i){
    var x=margin.left+i*(barW+2)+barW/2;
    var y=margin.top+chartH-(chartH*c.pctAcum/100);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Pontos na linha
  colabs.forEach(function(c,i){
    var x=margin.left+i*(barW+2)+barW/2;
    var y=margin.top+chartH-(chartH*c.pctAcum/100);
    ctx.beginPath();ctx.arc(x,y,3,0,2*Math.PI);
    ctx.fillStyle='#1a5f8a';ctx.fill();
  });

  // Linhas de corte ABC
  var x80=margin.left+chartW*(0.8);
  var x95=margin.left+chartW*(0.95);
  ctx.setLineDash([4,4]);ctx.lineWidth=1;
  ctx.strokeStyle='rgba(26,107,58,0.5)';
  ctx.beginPath();ctx.moveTo(x80,margin.top);ctx.lineTo(x80,margin.top+chartH);ctx.stroke();
  ctx.strokeStyle='rgba(138,96,16,0.5)';
  ctx.beginPath();ctx.moveTo(x95,margin.top);ctx.lineTo(x95,margin.top+chartH);ctx.stroke();
  ctx.setLineDash([]);

  // Legendas ABC
  ctx.fillStyle='rgba(26,107,58,0.7)';ctx.font='bold 9px Arial';ctx.textAlign='left';
  ctx.fillText('A',margin.left+4,margin.top+12);
  ctx.fillStyle='rgba(138,96,16,0.7)';
  ctx.fillText('B',x80+4,margin.top+12);
  ctx.fillStyle='rgba(139,58,15,0.7)';
  ctx.fillText('C',x95+4,margin.top+12);

  // Eixo linha acumulada
  ctx.fillStyle='#1a5f8a';ctx.font='9px Arial';ctx.textAlign='left';
  ctx.fillText('% acum.',margin.left+chartW+4,margin.top+12);
}

function drawEvolucao(dias,prodPorDia){
  var canvas=document.getElementById('chart-evolucao');if(!canvas)return;
  var W=canvas.offsetWidth;var H=220;
  canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(dias.length===0)return;

  var margin={left:40,right:20,top:20,bottom:30};
  var chartW=W-margin.left-margin.right;
  var chartH=H-margin.top-margin.bottom;
  var vals=dias.map(function(d){return prodPorDia[d.toDateString()]||0;});
  var maxV=Math.max.apply(null,vals)||1;

  // Grade
  ctx.strokeStyle='rgba(44,37,32,0.1)';ctx.lineWidth=1;
  [0,25,50,75,100].forEach(function(pct){
    var y=margin.top+chartH-(chartH*pct/100);
    ctx.beginPath();ctx.moveTo(margin.left,y);ctx.lineTo(margin.left+chartW,y);ctx.stroke();
    ctx.fillStyle='#6B5A4E';ctx.font='9px Arial';ctx.textAlign='right';
    ctx.fillText(Math.round(maxV*pct/100),margin.left-4,y+3);
  });

  var step=chartW/(dias.length-1||1);

  // Area preenchida
  ctx.beginPath();
  ctx.moveTo(margin.left,margin.top+chartH);
  dias.forEach(function(d,i){
    var x=margin.left+i*step;
    var y=margin.top+chartH-Math.round((vals[i]/maxV)*chartH);
    ctx.lineTo(x,y);
  });
  ctx.lineTo(margin.left+(dias.length-1)*step,margin.top+chartH);
  ctx.closePath();
  ctx.fillStyle='rgba(26,95,138,0.15)';ctx.fill();

  // Linha
  ctx.strokeStyle='#1a5f8a';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();
  dias.forEach(function(d,i){
    var x=margin.left+i*step;
    var y=margin.top+chartH-Math.round((vals[i]/maxV)*chartH);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Pontos e valores
  dias.forEach(function(d,i){
    var x=margin.left+i*step;
    var y=margin.top+chartH-Math.round((vals[i]/maxV)*chartH);
    ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);
    ctx.fillStyle='#1a5f8a';ctx.fill();
    ctx.strokeStyle='#DCCCBE';ctx.lineWidth=1.5;ctx.stroke();
    if(vals[i]>0){
      ctx.fillStyle='#2C2520';ctx.font='bold 9px Arial';ctx.textAlign='center';
      ctx.fillText(vals[i],x,y-8);
    }
    // Dia do mes
    ctx.fillStyle='#6B5A4E';ctx.font='9px Arial';ctx.textAlign='center';
    ctx.fillText(d.getDate(),x,margin.top+chartH+16);
  });
}

function drawSetores(lans){
  var canvas=document.getElementById('chart-setores');if(!canvas)return;
  var W=canvas.offsetWidth;var H=220;
  canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  var margin={left:40,right:20,top:20,bottom:60};
  var chartW=W-margin.left-margin.right;
  var chartH=H-margin.top-margin.bottom;

  var setoresData=[];
  SETORES.forEach(function(setor){
    var d=calcSetorData(setor,lans);
    if(d.colabs.length===0)return;
    var prod=d.colabs.reduce(function(s,c){return s+(d.mapTotal[c.nome]||0);},0);
    var meta=d.colabs.reduce(function(s,c){return s+getMetaPeriodo(c.meta);},0);
    setoresData.push({nome:setor.nome,cor:setor.cor,prod:prod,meta:meta});
  });

  if(setoresData.length===0)return;
  var maxV=Math.max.apply(null,setoresData.map(function(s){return Math.max(s.prod,s.meta);}));
  var groupW=chartW/setoresData.length;
  var barW=Math.min(30,groupW*0.35);

  // Grade
  ctx.strokeStyle='rgba(44,37,32,0.1)';ctx.lineWidth=1;
  [0,25,50,75,100].forEach(function(pct){
    var y=margin.top+chartH-(chartH*pct/100);
    ctx.beginPath();ctx.moveTo(margin.left,y);ctx.lineTo(margin.left+chartW,y);ctx.stroke();
    ctx.fillStyle='#6B5A4E';ctx.font='9px Arial';ctx.textAlign='right';
    ctx.fillText(Math.round(maxV*pct/100),margin.left-4,y+3);
  });

  setoresData.forEach(function(s,i){
    var cx=margin.left+i*groupW+groupW/2;

    // Barra meta (fundo)
    var metaH=maxV>0?Math.round((s.meta/maxV)*chartH):0;
    ctx.fillStyle='rgba(44,37,32,0.12)';
    ctx.fillRect(cx-barW-2,margin.top+chartH-metaH,barW,metaH);

    // Barra producao
    var prodH=maxV>0?Math.round((s.prod/maxV)*chartH):0;
    ctx.fillStyle=s.cor;
    ctx.fillRect(cx+2,margin.top+chartH-prodH,barW,prodH);

    // Valores
    if(s.meta>0){ctx.fillStyle='rgba(44,37,32,0.4)';ctx.font='8px Arial';ctx.textAlign='center';ctx.fillText(s.meta,cx-barW/2-2,margin.top+chartH-metaH-4);}
    if(s.prod>0){ctx.fillStyle=s.cor;ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.fillText(s.prod,cx+barW/2+2,margin.top+chartH-prodH-4);}

    // Nome setor
    ctx.save();
    ctx.translate(cx,margin.top+chartH+8);
    ctx.rotate(-Math.PI/5);
    ctx.fillStyle='#6B5A4E';ctx.font='9px Arial';ctx.textAlign='right';
    ctx.fillText(s.nome.split('/')[0].trim(),0,0);
    ctx.restore();
  });

  // Legenda
  var lx=margin.left+chartW-120;
  ctx.fillStyle='rgba(44,37,32,0.2)';ctx.fillRect(lx,margin.top,14,10);
  ctx.fillStyle='#6B5A4E';ctx.font='9px Arial';ctx.textAlign='left';ctx.fillText('Meta',lx+18,margin.top+9);
  ctx.fillStyle='#8B3A0F';ctx.fillRect(lx,margin.top+16,14,10);
  ctx.fillStyle='#6B5A4E';ctx.fillText('Realizado',lx+18,margin.top+25);
}

async function carregarDados(){
  document.getElementById('app').innerHTML='<div class="loading-msg"><div class="spinner"></div>Carregando dados...</div>';
  try{
    var r0=await fetch(COLAB_URL);if(r0.ok)COLAB_DATA=parseColab(await r0.text());
    var r1=await fetch(CONFIG_URL);if(r1.ok)METAS=parseConfig(await r1.text());
    var r2=await fetch(LANCAMENTOS_URL);if(!r2.ok)throw new Error('HTTP '+r2.status);
    var txt=await r2.text();
    var linhas=txt.split('\n').filter(function(l){return l.trim();});
    ALL_LANCAMENTOS=[];
    for(var i=3;i<linhas.length;i++){
      var cc=parseCSVLine(linhas[i]);
      if(!cc[0]||!cc[1])continue;
      ALL_LANCAMENTOS.push({data:cc[0],nome:cc[1],setor:cc[2],prodCorpo:cc[3],prodAlmof:cc[4],retrabalho:cc[5]});
    }
    render();
  }catch(e){
    document.getElementById('app').innerHTML='<div class="loading-msg" style="color:#8B3A0F">Erro: '+e.message+'</div>';
    console.error(e);
  }
}
carregarDados();

</script>
